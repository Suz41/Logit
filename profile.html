<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Log!t - Profile</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">
<style>

:root{
--text:#e5e5e5;
--muted:#636366;
--dim:#48484a;
--border:rgba(255,255,255,0.06);
--green:#30d158;
--surface:rgba(28,28,30,0.6);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
min-height:100%;
background:#000;
color:var(--text);
font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
}

body::-webkit-scrollbar{display:none;}

/* ========= HEADER ========= */

.header{
position:sticky;
top:0;
z-index:20;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:0.5px solid var(--border);
}

.headerRow{
height:52px;
padding:0 14px;
display:flex;
align-items:center;
justify-content:space-between;
}

.headerTitle{
font-size:17px;
font-weight:600;
letter-spacing:-0.3px;
position:absolute;
left:50%;
transform:translateX(-50%);
}

.headBtn{
width:32px;
height:32px;
border:none;
border-radius:50%;
background:rgba(255,255,255,0.08);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* ========= PROFILE CARD ========= */

.profileCard{
padding:24px 16px 20px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

.avatar{
width:76px;
height:76px;
border-radius:50%;
background:var(--surface);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:700;
color:#fff;
margin-bottom:10px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.08);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.profileName{
font-size:20px;
font-weight:700;
color:#fff;
margin-bottom:3px;
}

.profileBio{
font-size:12px;
color:var(--muted);
max-width:260px;
line-height:1.4;
margin-bottom:14px;
}

.profileStats{
display:flex;
gap:0;
margin-bottom:14px;
background:var(--surface);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
border:0.5px solid var(--border);
border-radius:12px;
overflow:hidden;
}

.profileStat{
display:flex;
flex-direction:column;
align-items:center;
padding:12px 20px;
position:relative;
}

.profileStat:not(:last-child)::after{
content:'';
position:absolute;
right:0;
top:20%;
height:60%;
width:0.5px;
background:var(--border);
}

.profileStatNum{
font-size:17px;
font-weight:700;
color:#fff;
}

.profileStatLabel{
font-size:9px;
color:var(--dim);
text-transform:uppercase;
letter-spacing:0.5px;
margin-top:2px;
}

.editBtn{
height:30px;
padding:0 14px;
border:0.5px solid var(--border);
border-radius:8px;
background:rgba(255,255,255,0.04);
color:var(--muted);
font-size:11px;
font-weight:500;
cursor:pointer;
font-family:'Inter',sans-serif;
}

/* ========= CARDS ========= */

.card{
margin:0 12px 10px;
padding:14px;
border:0.5px solid var(--border);
border-radius:12px;
background:var(--surface);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
}

/* ========= STREAK ========= */

.streakRow{
display:flex;
align-items:center;
gap:10px;
}

.streakNum{
font-size:16px;
font-weight:700;
color:#fff;
}

.streakLabel{
font-size:11px;
color:var(--muted);
}

/* ========= HEATMAP ========= */

.heatmapMonths{
display:flex;
justify-content:space-between;
padding:0 2px;
margin-bottom:4px;
}

.heatmapMonth{
font-size:8px;
color:var(--dim);
}

.heatmapWrap{
display:flex;
gap:4px;
}

.heatmapDayLabels{
display:flex;
flex-direction:column;
gap:2px;
padding-top:0;
}

.heatmapDayLabel{
height:12px;
font-size:7px;
color:var(--dim);
display:flex;
align-items:center;
}

.heatmapGrid{
display:flex;
gap:2px;
flex-wrap:wrap;
justify-content:flex-start;
flex:1;
}

.heatmapTotal{
font-size:10px;
color:var(--muted);
margin-top:8px;
text-align:right;
}

.heatmapTotal strong{
color:#fff;
font-weight:600;
}

.heatmapCell{
width:12px;
height:12px;
border-radius:2px;
background:rgba(255,255,255,0.04);
}

.heatmapCell.l1{background:#0e4429;}
.heatmapCell.l2{background:#006d32;}
.heatmapCell.l3{background:#26a641;}
.heatmapCell.l4{background:#39d353;}

.heatmapMeta{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.heatmapTitle{
font-size:11px;
font-weight:600;
color:var(--muted);
text-transform:uppercase;
letter-spacing:0.5px;
}

.heatmapLegend{
display:flex;
align-items:center;
gap:2px;
}

.heatmapLegend span{
font-size:8px;
color:var(--dim);
margin:0 2px;
}

/* ========= YEAR PICKER ========= */

.yearPicker{
display:flex;
gap:4px;
margin-bottom:10px;
flex-wrap:wrap;
}

.yearBtn{
height:24px;
padding:0 10px;
border:0.5px solid var(--border);
border-radius:6px;
background:transparent;
color:var(--dim);
font-size:10px;
font-weight:500;
cursor:pointer;
font-family:'Inter',sans-serif;
}

.yearBtn.active{
background:rgba(255,255,255,0.08);
color:#fff;
border-color:rgba(255,255,255,0.12);
}

/* ========= RATING DISTRIBUTION ========= */

.ratingDist{
display:flex;
align-items:flex-end;
gap:4px;
height:50px;
position:relative;
}

.ratingCol{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
height:100%;
}

.ratingBar{
width:100%;
border-radius:2px 2px 0 0;
background:var(--green);
min-height:0;
transition:height 0.4s ease;
opacity:0.65;
}

.ratingLabel{
font-size:8px;
color:var(--dim);
margin-top:4px;
}

/* ========= SECTION LABEL ========= */

.sectionLabel{
font-size:11px;
font-weight:600;
color:var(--muted);
text-transform:uppercase;
letter-spacing:0.5px;
margin-bottom:8px;
}

/* ========= BOTTOM NAV ========= */

.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
height:83px;
background:rgba(0,0,0,0.88);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-top:0.5px solid rgba(255,255,255,0.06);
display:flex;
align-items:flex-start;
justify-content:space-around;
padding-top:8px;
z-index:30;
transition:transform 0.3s ease;
}

.bottomNav.hidden{transform:translateY(100%);}

.navItem{
display:flex;
flex-direction:column;
align-items:center;
gap:2px;
background:none;
border:none;
color:#636366;
font-size:10px;
font-weight:500;
cursor:pointer;
font-family:'Inter',sans-serif;
padding:4px 12px;
}

.navItem .navIcon{width:24px;height:24px;}

.navItem.on{color:#fff;}

/* ========= EDIT MODAL ========= */

.modal{
display:none;
position:fixed;
inset:0;
z-index:50;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
}

.modal.open{display:flex;align-items:flex-end;justify-content:center;}

.modalSheet{
width:100%;
max-width:420px;
background:#1c1c1e;
border-radius:14px 14px 0 0;
padding:20px 16px 30px;
max-height:80vh;
overflow-y:auto;
}

.modalTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.modalTop h3{
font-size:17px;
font-weight:600;
}

.modalClose{
width:28px;
height:28px;
border:none;
border-radius:50%;
background:#2c2c2e;
color:#fff;
font-size:16px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.inputGroup{
margin-bottom:12px;
}

.inputLabel{
font-size:11px;
color:var(--muted);
text-transform:uppercase;
letter-spacing:0.5px;
margin-bottom:6px;
}

.inputField{
width:100%;
height:42px;
background:#2c2c2e;
border:none;
border-radius:10px;
padding:0 12px;
color:#fff;
font-size:14px;
font-family:'Inter',sans-serif;
outline:none;
}

.inputField:focus{
box-shadow:0 0 0 2px rgba(10,132,255,0.3);
}

.textArea{
width:100%;
height:60px;
background:#2c2c2e;
border:none;
border-radius:10px;
padding:10px 12px;
color:#fff;
font-size:14px;
font-family:'Inter',sans-serif;
outline:none;
resize:none;
}

.avatarPicker{
display:flex;
align-items:center;
gap:12px;
margin-bottom:16px;
}

.avatarPreview{
width:52px;
height:52px;
border-radius:50%;
background:#2c2c2e;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
color:#fff;
overflow:hidden;
flex-shrink:0;
border:2px solid rgba(255,255,255,0.08);
}

.avatarPreview img{
width:100%;
height:100%;
object-fit:cover;
}

.avatarInput{
flex:1;
}

.saveBtn{
width:100%;
height:44px;
border:none;
border-radius:10px;
background:#30d158;
color:#000;
font-size:14px;
font-weight:600;
cursor:pointer;
font-family:'Inter',sans-serif;
margin-top:8px;
}

/* ========= MISC ========= */

.bodyPad{
padding-bottom:100px;
}
</style>
</head>
<body>

<!-- ========= HEADER ========= -->

<div class="header">

<div class="headerRow">

<button
class="headBtn"
onclick="location.href='index.html'">

<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

</svg>

<nav class="bottomNav">

<button class="navItem" id="navLibrary">

<svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
<rect x="3" y="3" width="7" height="7" rx="1.5"/>
<rect x="14" y="3" width="7" height="7" rx="1.5"/>

<rect x="14" y="14" width="7" height="7" rx="1.5"/>
</svg>

<svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
<circle cx="12" cy="7" r="4"/>
</svg>

Profile

</button>

<svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
<path d="M12 20V10"/>
<path d="M18 20V4"/>
<path d="M6 20v-4"/>
</svg>

Stats

</button>

<script>

(function(){

function $(id){return document.getElementById(id);}

var movies=JSON.parse(localStorage.getItem('movies')||'[]');
var profile=JSON.parse(localStorage.getItem('profile')||'null')||{
name:'Sujal',
bio:'Film enthusiast',
avatar:''
};

/* ========= NAV ========= */

$('navLibrary').onclick=function(){location.href='index.html';};
$('navStats').onclick=function(){location.href='PS.html';};

/* ========= PROFILE DISPLAY ========= */

function renderProfile(){
var initial=profile.name?profile.name.charAt(0).toUpperCase():'S';
if(profile.avatar){
$('avatarDisplay').innerHTML='<img src="'+profile.avatar+'" alt="">';
$('avatarPreview').innerHTML='<img src="'+profile.avatar+'" alt="">';
}else{
$('avatarDisplay').textContent=initial;
$('avatarPreview').textContent=initial;
}
$('nameDisplay').textContent=profile.name||'Sujal';
$('bioDisplay').textContent=profile.bio||'Film enthusiast';
}

/* ========= QUICK STATS ========= */

function renderStats(){
$('statFilms').textContent=movies.length;
var totalMins=movies.reduce(function(a,b){return a+(Number(b.rt)||0);},0);
$('statDays').textContent=(totalMins/1440).toFixed(1);
var totalRating=movies.reduce(function(a,b){return a+(Number(b.r)||0);},0);
$('statAvg').textContent=movies.length?(totalRating/movies.length).toFixed(1):'0.0';
}

/* ========= RATING DISTRIBUTION ========= */

function renderRatingDist(){
var keys=['0.5','1','1.5','2','2.5','3','3.5','4','4.5','5'];
var bins={};
keys.forEach(function(k){bins[k]=0;});
movies.forEach(function(m){
var r=Number(m.r);
if(r>=0.5&&r<=5){
var rounded=Math.round(r*2)/2;
var key=rounded.toFixed(1);
if(bins[key]!==undefined)bins[key]++;
}
});
var max=0;
keys.forEach(function(k){if(bins[k]>max)max=bins[k];});
var html='';
keys.forEach(function(k){
var h=max?Math.round(bins[k]/max*42):0;
var label=k.endsWith('.0')?k.replace('.0',''):k;
html+='<div class="ratingCol"><div class="ratingBar" style="height:'+h+'px"></div><div class="ratingLabel">'+label+'</div></div>';
});
$('ratingDist').innerHTML=html;
}

/* ========= STREAK ========= */

function renderStreak(){
var monthSet=new Set();
movies.forEach(function(m){
if(m.d)monthSet.add(m.d.substring(0,7));
});
var sorted=Array.from(monthSet).sort();
var streak=0,best=0;
for(var i=0;i<sorted.length;i++){
if(i===0){streak=1;best=1;continue;}
var prev=new Date(sorted[i-1]+'-01');
var curr=new Date(sorted[i]+'-01');
var diff=(curr.getFullYear()-prev.getFullYear())*12+(curr.getMonth()-prev.getMonth());
if(diff===1){streak++;if(streak>best)best=streak;}
else{streak=1;}
}
$('streakNum').textContent=best;
$('streakLabel').textContent=best===1?'month streak':'month streak';
}

/* ========= HEATMAP ========= */

function getYears(){
var years=new Set();
movies.forEach(function(m){
if(m.d)years.add(m.d.substring(0,4));
});
years.add(String(new Date().getFullYear()));
return Array.from(years).sort().reverse();
}

var selectedYear=String(new Date().getFullYear());

function renderYearPicker(){
var years=getYears();
var html='';
years.forEach(function(y){
html+='<button class="yearBtn'+(y===selectedYear?' active':'')+'" data-year="'+y+'">'+y+'</button>';
});
$('yearPicker').innerHTML=html;
$('yearPicker').querySelectorAll('.yearBtn').forEach(function(btn){
btn.onclick=function(){
selectedYear=this.dataset.year;
renderYearPicker();
renderHeatmap();
};
});
}

function renderHeatmap(){
var countMap={};
movies.forEach(function(m){
if(m.d&&m.d.startsWith(selectedYear)){
var day=m.d;
countMap[day]=(countMap[day]||0)+1;
}
});

var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var monthsHtml='';
months.forEach(function(m){
monthsHtml+='<span class="heatmapMonth">'+m+'</span>';
});
$('heatmapMonths').innerHTML=monthsHtml;

var gridHtml='';
var startDate=new Date(selectedYear+'-01-01');
var endDate=new Date(selectedYear+'-12-31');
var dayOfWeek=startDate.getDay();
for(var d=0;d<dayOfWeek;d++){
gridHtml+='<div class="heatmapCell" style="visibility:hidden;"></div>';
}
var totalFilms=0;
var current=new Date(startDate);
while(current<=endDate){
var dateStr=current.toISOString().substring(0,10);
var count=countMap[dateStr]||0;
if(count>0)totalFilms+=count;
var level='';
if(count>=4)level=' l4';
else if(count>=3)level=' l3';
else if(count>=2)level=' l2';
else if(count>=1)level=' l1';
gridHtml+='<div class="heatmapCell'+level+'" title="'+dateStr+': '+count+'"></div>';
current.setDate(current.getDate()+1);
}
$('heatmapGrid').innerHTML=gridHtml;
$('heatmapTotal').innerHTML=totalFilms>0?'<strong>'+totalFilms+'</strong> films in '+selectedYear:'No films logged in '+selectedYear;
}

/* ========= EDIT MODAL ========= */

$('editProfileBtn').onclick=function(){
$('profileName').value=profile.name||'';
$('profileBio').value=profile.bio||'';
$('avatarUrl').value=profile.avatar||'';
$('editModal').classList.add('open');
};

$('closeEdit').onclick=function(){
$('editModal').classList.remove('open');
};

$('editModal').onclick=function(e){
if(e.target===$('editModal'))$('editModal').classList.remove('open');
};

$('saveProfile').onclick=function(){
profile.name=$('profileName').value.trim()||'Sujal';
profile.bio=$('profileBio').value.trim()||'Film enthusiast';
profile.avatar=$('avatarUrl').value.trim();
localStorage.setItem('profile',JSON.stringify(profile));
renderProfile();
$('editModal').classList.remove('open');
};

/* ========= AVATAR PREVIEW ========= */

$('avatarUrl').oninput=function(){
var url=this.value.trim();
if(url){
$('avatarPreview').innerHTML='<img src="'+url+'" alt="">';
}else{
var initial=profile.name?profile.name.charAt(0).toUpperCase():'S';
$('avatarPreview').textContent=initial;
}
};

/* ========= INIT ========= */

renderProfile();
renderStats();
renderStreak();
renderRatingDist();
renderYearPicker();
renderHeatmap();

})();

</script>
</body>
</html>
