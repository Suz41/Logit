<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Log!t - Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--text:#e5e5e5;
--muted:#636366;
--border:rgba(255,255,255,0.06);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
min-height:100%;
background:#000;
color:var(--text);
font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
}

body::-webkit-scrollbar{display:none;}

/* ========= HEADER ========= */

.header{
position:sticky;
top:0;
z-index:20;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:0.5px solid var(--border);
}

.headerRow{
height:52px;
padding:0 14px;
display:flex;
align-items:center;
justify-content:space-between;
}

.headerTitle{
font-size:17px;
font-weight:600;
letter-spacing:-0.3px;
position:absolute;
left:50%;
transform:translateX(-50%);
}

.headBtn{
width:32px;
height:32px;
border:none;
border-radius:50%;
background:rgba(255,255,255,0.08);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* ========= BOTTOM NAV ========= */

.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
height:83px;
background:rgba(0,0,0,0.88);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-top:0.5px solid rgba(255,255,255,0.06);
display:flex;
align-items:flex-start;
justify-content:space-around;
padding-top:8px;
z-index:30;
}

.navItem{
display:flex;
flex-direction:column;
align-items:center;
gap:2px;
background:none;
border:none;
color:#636366;
font-size:10px;
font-weight:500;
cursor:pointer;
font-family:'Inter',sans-serif;
padding:4px 12px;
}

.navItem .navIcon{width:24px;height:24px;}

.navItem.on{color:#fff;}
</style>
</head>
<body>

<div class="header">
<div class="headerRow">
<button class="headBtn" onclick="location.href='index.html'">
<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
<path d="M15 18l-6-6 6-6"/>
</svg>
</button>
<div class="headerTitle">Profile</div>
<div style="width:32px;"></div>
</div>
</div>

<nav class="bottomNav">
<button class="navItem" onclick="location.href='index.html'">
<svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
<rect x="3" y="3" width="7" height="7" rx="1.5"/>
<rect x="14" y="3" width="7" height="7" rx="1.5"/>
<rect x="3" y="14" width="7" height="7" rx="1.5"/>
<rect x="14" y="14" width="7" height="7" rx="1.5"/>
</svg>
Library
</button>
<button class="navItem on">
<svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
<circle cx="12" cy="7" r="4"/>
</svg>
Profile
</button>
<button class="navItem" onclick="location.href='PS.html'">
<svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
<path d="M12 20V10"/>
<path d="M18 20V4"/>
<path d="M6 20v-4"/>
</svg>
Stats
</button>
</nav>

</body>
</html>
