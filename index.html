<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Log!t</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --grid: 3;
  --bg: #0d0d0d;
  --surface: #1c1c1e;
  --surface2: #2c2c2e;
  --text: #fff;
  --muted: #98989d;
  --accent: #0a84ff;
  --green: #30d158;
  --red: #ff453a;
  --pink: #ff375f;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body.no-scroll { overflow: hidden; }
body::-webkit-scrollbar { display: none; }

/* ========= HEADER ========= */

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,13,13,0.85);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
}

.headerRow {
  height: 52px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: 'Poppins', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #fff;
}

.headBtn {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: var(--surface);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}

/* ========= SETTINGS PILL ========= */

.settingsIcon {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color 0.2s;
}

.settingsIcon:hover, .settingsIcon.active { color: #fff; }

.settingsPanel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.25s ease;
}

.settingsPanel.open {
  max-height: 50px;
}

.settingsRow {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-top: 0.5px solid rgba(255,255,255,0.06);
}

.settingsLabel {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.settingsToggle {
  position: relative;
  width: 36px;
  height: 20px;
  background: #39393d;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  padding: 0;
  transition: background 0.2s ease;
  flex-shrink: 0;
}

.settingsToggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s ease;
}

.settingsToggle.on { background: #34c759; }
.settingsToggle.on::after { transform: translateX(16px); }

.gridSlider {
  display: flex;
  align-items: center;
  gap: 6px;
}

.gridSlider input[type="range"] {
  width: 90px;
  height: 14px;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  outline: none;
}

.gridSlider input[type="range"]::-webkit-slider-runnable-track {
  height: 4px;
  background: #39393d;
  border-radius: 2px;
}

.gridSlider input[type="range"]::-webkit-slider-container {
  background: transparent;
}

.gridSlider {
  position: relative;
}

.gridTicks {
  position: absolute;
  top: 50%;
  left: 0;
  width: 90px;
  height: 14px;
  transform: translateY(-50%);
  display: flex;
  justify-content: space-between;
  align-items: center;
  pointer-events: none;
  padding: 0 1px;
}

.gridTicks span {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #555;
}

.gridSlider input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  margin-top: -4px;
}

.gridSlider input[type="range"]::-moz-range-track {
  height: 4px;
  background: #39393d;
  border-radius: 2px;
  border: none;
}

.gridSlider input[type="range"]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  border: none;
}

.gridValue {
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  min-width: 14px;
  text-align: center;
}

/* ========= BOTTOM NAV ========= */

.bottomNav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: rgba(13,13,13,0.88);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
  transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
}

.bottomNav.hidden {
  transform: translateY(100%);
}

.navItem {
  border: none;
  background: none;
  color: #48484a;
  font-size: 9px;
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  padding: 6px 28px;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  transition: color 0.2s ease;
}

.navItem .navIcon { font-size: 20px; line-height: 1; transition: color 0.2s ease; }

.navItem.on { color: #fff; }

.navAdd {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #fff;
  color: #000;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(255,255,255,0.1);
  transition: transform 0.15s ease;
}

.navAdd:active { transform: scale(0.92); }
.navAdd .navIcon { width: 22px; height: 22px; }

body { padding-bottom: 64px; }

/* ========= LIBRARY ========= */

.library {
  padding: 8px 12px 30px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.monthSection { display: flex; flex-direction: column; }

.monthMovies {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.25s ease-out;
}
.monthMovies > .moviesGridWrap { overflow: hidden; }
.monthSection.active .monthMovies { grid-template-rows: 1fr; }

.monthHead {
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2px;
  cursor: pointer;
  user-select: none;
}

.monthLeft { display: flex; align-items: center; gap: 6px; }

.monthArrow {
  font-size: 9px;
  color: #48484a;
  transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
  width: 10px;
  text-align: center;
}
.monthSection.active .monthArrow { transform: rotate(90deg); }

.monthHead h2 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--muted);
}

.monthHead .count {
  font-size: 9px;
  color: #48484a;
  font-weight: 700;
}

.moviesGrid {
  display: grid;
  grid-template-columns: repeat(var(--grid), 1fr);
  gap: 3px;
  padding-top: 4px;
  align-items: start;
}

.movie {
  display: flex;
  flex-direction: column;
  cursor: pointer;
  min-height: 0;
}

.movie img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
  border-radius: 3px;
  background: var(--surface);
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.movieDate {
  height: 18px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  margin-top: 4px;
  padding: 0 2px;
  white-space: nowrap;
  overflow: hidden;
  flex-shrink: 0;
}

.movieDate .day { font-weight: 700; color: #fff; }
.movieDate .rewatch { color: var(--pink); font-weight: 700; }

body.hide-dates .movieDate { display: none; }

/* ========= EMPTY STATE ========= */

.empty {
  height: 65vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.emptyIcon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 8px;
}

.emptyIcon svg { color: var(--muted); }

.emptyTitle {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
}

.emptyHint {
  font-size: 13px;
  color: var(--muted);
}

/* ========= LOADING ========= */

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 0;
  gap: 6px;
}

.loadingDot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: loadPulse 1s infinite ease-in-out;
}

.loadingDot:nth-child(2) { animation-delay: 0.15s; }
.loadingDot:nth-child(3) { animation-delay: 0.3s; }

@keyframes loadPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ========= ERROR ========= */

.errorMsg {
  text-align: center;
  padding: 20px;
  color: var(--red);
  font-size: 13px;
}

/* ========= ADD MODAL ========= */

.modal {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  padding: 16px;
  display: none;
  flex-direction: column;
  opacity: 0;
  transition: opacity 0.25s;
}

.modal.active { display: flex; opacity: 1; }

.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.top h3 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.close {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: var(--surface);
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.searchBox {
  height: 44px;
  background: var(--surface);
  border-radius: 12px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  margin-bottom: 10px;
}

.searchBox input {
  width: 100%;
  height: 100%;
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-size: 15px;
}

.searchBox input::placeholder { color: #48484a; }

.clearBtn {
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 50%;
  background: #48484a;
  color: #000;
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.clearBtn.visible { display: flex; }

.searchRow { display: flex; gap: 8px; margin-bottom: 12px; }

.searchRow input {
  flex: 1;
  height: 42px;
  background: var(--surface);
  border: none;
  outline: none;
  border-radius: 12px;
  padding: 0 12px;
  color: #fff;
  font-size: 13px;
}

.searchRow input::placeholder { color: #48484a; }

.results {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  overflow: auto;
  padding-bottom: 30px;
}

.result {
  aspect-ratio: 2/3;
  border-radius: 3px;
  overflow: hidden;
  background: var(--surface);
  cursor: pointer;
  transition: transform 0.1s ease;
}
.result:active { transform: scale(0.96); }
.result img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ========= RATING ========= */

.ratingSheet { position: fixed; inset: 0; z-index: 500; }

.sheetBg { position: absolute; inset: 0; background: rgba(0,0,0,0.65); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }

.sheet {
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 10px;
  background: #1c1c1e;
  border-radius: 20px;
  padding: 20px;
  transform: translateY(20px);
  opacity: 0;
  animation: sheetIn 0.3s cubic-bezier(0.2, 0, 0, 1) forwards;
}

@keyframes sheetIn {
  to { transform: translateY(0); opacity: 1; }
}

.sheet img { width: 86px; height: 129px; border-radius: 4px; object-fit: cover; display: block; margin: auto; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.sheet h3 { font-size: 17px; text-align: center; margin-bottom: 16px; font-weight: 600; }

.rates { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 16px; }

.rates button {
  height: 38px;
  border: none;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

.rates button.active { background: #fff; color: #000; font-weight: 700; }

.sheetAdd {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  opacity: 0.4;
  pointer-events: none;
  transition: opacity 0.2s;
}

.sheetAdd.enabled { opacity: 1; pointer-events: auto; }

/* ========= META ========= */

.metaModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  display: none;
  align-items: flex-end;
  z-index: 400;
}

.metaModal.active { display: flex; }

.meta {
  width: 100%;
  background: #1c1c1e;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 20px 16px;
  max-height: 90vh;
  overflow: auto;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.2, 0, 0, 1);
}

.metaModal.active .meta { transform: translateY(0); }

.metaHandle {
  width: 36px;
  height: 4px;
  background: #48484a;
  border-radius: 2px;
  margin: 0 auto 16px;
}

.metaHeader { display: flex; gap: 14px; margin-bottom: 16px; }

.posterWrap { position: relative; width: 90px; height: 135px; flex-shrink: 0; }
.poster { width: 100%; height: 100%; border-radius: 4px; object-fit: cover; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.posterBtn { position: absolute; inset: 0; border: none; background: none; cursor: pointer; }

.metaInfo { flex: 1; min-width: 0; }

.topRow { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.topRow h2 { font-size: 20px; font-weight: 600; line-height: 1.15; word-break: break-word; letter-spacing: -0.3px; }

.ratingBox {
  height: 30px;
  padding: 0 12px;
  border-radius: 999px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.ratingEdit {
  display: none;
  gap: 4px;
  flex-wrap: wrap;
}
.ratingEdit button {
  height: 28px;
  min-width: 36px;
  border: none;
  border-radius: 8px;
  background: var(--surface);
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  padding: 0 6px;
}
.ratingEdit button.active { background: #fff; color: #000; font-weight: 700; }

.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chips span {
  background: var(--surface);
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
}

.info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.info p, .logged p, .castBox p { font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.info h4, .logged h4, .castBox h4 { font-size: 13px; font-weight: 500; line-height: 1.4; word-break: break-word; }

.logged { margin: 16px 0; }

.castBox { background: var(--surface); border-radius: 14px; padding: 12px; margin-bottom: 16px; }

.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.actions button { height: 44px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }

.edit { background: #fff; color: #000; }
.deleteBtn { background: var(--red); color: #fff; }

.metaInput {
  display: none;
  width: 100%;
  height: 36px;
  margin-top: 6px;
  background: var(--surface);
  border: none;
  outline: none;
  border-radius: 10px;
  padding: 0 10px;
  color: #fff;
  font-size: 13px;
}

.meta.editing .metaInput { display: block; }
.meta.editing h4 { display: none; }
.metaCheckbox { display: none; align-items: center; gap: 10px; margin-top: 10px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
.sheetToggle { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
.metaCheckbox .toggle-track,
.sheetToggle .toggle-track {
  position: relative;
  width: 51px;
  height: 31px;
  background: #39393d;
  border-radius: 31px;
  transition: background 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  flex-shrink: 0;
}
.metaCheckbox .toggle-track::after,
.sheetToggle .toggle-track::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 27px;
  height: 27px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.metaCheckbox input,
.sheetToggle input { display: none; }
.metaCheckbox input:checked ~ .toggle-track,
.sheetToggle input:checked ~ .toggle-track { background: var(--pink); }
.metaCheckbox input:checked ~ .toggle-track::after,
.sheetToggle input:checked ~ .toggle-track::after { transform: translateX(20px); }
.meta.editing .metaCheckbox { display: flex; }
.meta.editing #mWatch { display: none; }
.meta.editing .ratingBox { display: none; }
#saveBtn { display: none; }
.meta.editing #saveBtn { display: block; }
.meta.editing #editBtn, .meta.editing #deleteBtn { display: none; }
#eRating { display: none; }
.meta.editing #eRating { display: flex; }

/* ========= POSTERS ========= */

.posterPicker { position: fixed; inset: 0; z-index: 600; }
.posterBg { position: absolute; inset: 0; background: rgba(0,0,0,0.6); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }

.posterSheet {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  background: #1c1c1e;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 16px;
  max-height: 80vh;
  overflow: auto;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.2, 0, 0, 1);
}

.posterPicker.active .posterSheet { transform: translateY(0); }

.posterSheetHandle {
  width: 36px;
  height: 4px;
  background: #48484a;
  border-radius: 2px;
  margin: 0 auto 14px;
}

.posterGrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }

.posterItem {
  position: relative;
  aspect-ratio: 2/3;
  border-radius: 3px;
  overflow: hidden;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s;
}

.posterItem.active { border-color: #fff; }
.posterItem img { width: 100%; height: 100%; object-fit: cover; display: block; }

.posterLang {
  position: absolute;
  left: 3px;
  right: 3px;
  bottom: 3px;
  height: 16px;
  border-radius: 999px;
  background: rgba(0,0,0,0.7);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
}

</style>
</head>
<body>

<header class="header" id="header">
  <div class="headerRow">
    <div class="logo">Log!t</div>
    <button class="settingsIcon" id="settingsBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <div class="settingsPanel" id="settingsPanel">
    <div class="settingsRow">
      <span class="settingsLabel">Dates</span>
      <button class="settingsToggle" id="dateToggle"></button>
      <span class="settingsLabel" style="margin-left:14px;">Cols</span>
      <div class="gridSlider">
        <div class="gridTicks"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <input type="range" id="gridSlider" min="3" max="10" step="any" value="3">
        <span class="gridValue" id="gridValue">3</span>
      </div>
    </div>
  </div>
</header>

<section class="library" id="library"></section>

<nav class="bottomNav">
  <button class="navItem on" id="navLibrary">
    <svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Library
  </button>
  <button class="navItem navAdd" id="navAdd">
    <svg class="navIcon" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <button class="navItem" id="navStats">
    <svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
    Stats
  </button>
</nav>

<!-- ========= ADD ========= -->
<div class="modal" id="modal">
  <div class="top">
    <h3>Add Movie</h3>
    <button class="close" id="closeBtn">&times;</button>
  </div>
  <div class="searchBox">
    <input type="text" placeholder="Movie name" id="query">
    <button class="clearBtn" id="clearQuery">&times;</button>
  </div>
  <div class="searchRow">
    <input type="number" placeholder="Year" id="year">
    <input type="date" id="watchDate">
  </div>
  <div class="results" id="results"></div>
</div>

<!-- ========= META ========= -->
<section class="metaModal" id="metaModal">
  <div class="meta">
    <div class="metaHandle"></div>
    <div class="metaHeader">
      <div class="posterWrap">
        <img class="poster" id="mPoster">
        <button class="posterBtn" id="changePoster"></button>
      </div>
      <div class="metaInfo">
        <div class="topRow">
          <h2 id="mTitle"></h2>
          <div class="ratingBox"><span id="mRating"></span></div>
          <div class="ratingEdit" id="eRating"></div>
        </div>
        <div class="chips">
          <span id="mYear"></span>
          <span id="mRun"></span>
          <span id="mGenre"></span>
        </div>
        <div class="info">
          <div>
            <p>Director</p>
            <h4 id="mDirector"></h4>
            <input class="metaInput" id="eDirector">
          </div>
          <div>
            <p>Language</p>
            <h4 id="mLang"></h4>
            <input class="metaInput" id="eLang">
          </div>
          <div>
            <p>Country</p>
            <h4 id="mCountry"></h4>
            <input class="metaInput" id="eCountry">
          </div>
          <div>
            <p>Watch</p>
            <h4 id="mWatch"></h4>
            <label class="metaCheckbox" id="eWatchWrap">
              <input type="checkbox" id="eWatch">
              <div class="toggle-track"></div>
              Rewatch
            </label>
          </div>
        </div>
      </div>
    </div>
    <div class="logged">
      <p>Logged</p>
      <h4 id="mLogged"></h4>
      <input class="metaInput" id="eLogged" type="date">
    </div>
    <div class="castBox">
      <p>Cast</p>
      <h4 id="mCast"></h4>
      <input class="metaInput" id="eCast">
    </div>
    <div class="actions">
      <button class="edit" id="editBtn">Edit</button>
      <button class="deleteBtn" id="deleteBtn">Delete</button>
      <button class="edit" id="saveBtn">Save</button>
    </div>
  </div>
</section>

<script>
(function() {
  'use strict';

  const API = localStorage.getItem('tmdb_key') || '';

  if (!API) {
    document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px;background:#0d0d0d;color:#fff;font-family:Inter,sans-serif;text-align:center;">'
      + '<h2 style="font-family:Poppins,sans-serif;margin-bottom:10px;">Welcome to Log!t</h2>'
      + '<p style="color:#888;font-size:13px;margin-bottom:20px;">Enter your TMDB API key to get started.<br><a href="https://www.themoviedb.org/settings/api" target="_blank" style="color:#e94560;">Get one free at themoviedb.org</a></p>'
      + '<input id="keyInput" type="text" placeholder="TMDB API Key" style="width:100%;max-width:320px;height:46px;background:#1a1a1a;border:none;border-radius:12px;padding:0 14px;color:#fff;font-size:14px;outline:none;margin-bottom:10px;">'
      + '<button id="keySave" style="width:100%;max-width:320px;height:44px;border:none;border-radius:12px;background:#fff;color:#000;font-size:14px;font-weight:700;cursor:pointer;">Save Key</button>'
      + '</div>';
    document.getElementById('keySave').onclick = function() {
      var v = document.getElementById('keyInput').value.trim();
      if (v) { localStorage.setItem('tmdb_key', v); location.reload(); }
    };
    throw new Error('No API key');
  }

  const state = {
    movies: [],
    current: null,
    cache: {},
    openMonths: new Set()
  };

  // DOM refs
  const $ = id => document.getElementById(id);
  const library = $('library');
  const modal = $('modal');
  const results = $('results');
  const metaModal = $('metaModal');
  const queryInput = $('query');
  const yearInput = $('year');
  const watchDate = $('watchDate');
  const sheetAddBtn = () => document.querySelector('.sheetAdd');

  watchDate.valueAsDate = new Date();

  // ========= UTILITIES =========

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function img(path, size) {
    if (!path) return '';
    return 'https://image.tmdb.org/t/p/' + (size || 'w500') + path;
  }

  function save() {
    localStorage.setItem('movies', JSON.stringify(state.movies));
  }

  function loadMovies() {
    var cached = localStorage.getItem('movies');
    state.movies = cached ? JSON.parse(cached) : [];
    // Strip poster arrays to save storage — fetch on-demand instead
    var stripped = false;
    state.movies.forEach(function(m) { if (m.p) { delete m.p; stripped = true; } });
    if (stripped) save();
  }

  async function tmdb(url) {
    if (state.cache[url]) return state.cache[url];
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error('API error');
      const d = await r.json();
      state.cache[url] = d;
      return d;
    } catch (e) {
      console.error('TMDB fetch failed:', e);
      return null;
    }
  }

  function showLoading(container) {
    container.innerHTML = '<div class="loading"><div class="loadingDot"></div><div class="loadingDot"></div><div class="loadingDot"></div></div>';
  }

  function showError(container, msg) {
    container.innerHTML = '<div class="errorMsg">' + esc(msg) + '</div>';
  }

  // ========= SETTINGS PANEL =========

  var settingsBtn = $('settingsBtn');
  var settingsPanel = $('settingsPanel');

  settingsBtn.onclick = function(e) {
    e.stopPropagation();
    var isOpen = settingsPanel.classList.toggle('open');
    settingsBtn.classList.toggle('active', isOpen);
  };

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.header')) {
      settingsPanel.classList.remove('open');
      settingsBtn.classList.remove('active');
    }
  });

  // ========= GRID =========

  let gridCount = Number(localStorage.getItem('grid')) || 3;
  var gridSlider = $('gridSlider');
  var gridValue = $('gridValue');

  gridSlider.value = gridCount;
  gridValue.textContent = gridCount;

  gridSlider.oninput = function() {
    gridCount = Math.round(Number(this.value));
    gridValue.textContent = gridCount;
    localStorage.setItem('grid', gridCount);
    updateGrid();
  };

  function updateGrid() {
    document.documentElement.style.setProperty('--grid', gridCount);
  }

  // ========= DATE TOGGLE =========

  let showDates = localStorage.getItem('dates') !== '0';
  var dateToggle = $('dateToggle');
  updateDateBtn();

  function updateDateBtn() {
    document.body.classList.toggle('hide-dates', !showDates);
    dateToggle.classList.toggle('on', showDates);
  }

  dateToggle.onclick = function() {
    showDates = !showDates;
    localStorage.setItem('dates', showDates ? '1' : '0');
    updateDateBtn();
  };

  // ========= STATS NAV =========

  $('navStats').onclick = function() {
    window.location.href = 'PS.html';
  };

  // ========= RENDER =========

  function renderMovies() {
    library.innerHTML = '';

    if (state.movies.length === 0) {
      library.innerHTML = '<div class="empty"><div class="emptyIcon"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M8 2v20M16 2v20M2 8h20M2 16h20"/></svg></div><div class="emptyTitle">No movies yet</div><div class="emptyHint">Tap + to log your first film</div></div>';
      return;
    }

    var sorted = state.movies.slice().sort(function(a, b) {
      return new Date(b.d) - new Date(a.d);
    });

    var grouped = {};
    sorted.forEach(function(movie) {
      var date = new Date(movie.d);
      var monthKey = date.getFullYear() + '-' + date.getMonth();
      if (!grouped[monthKey]) {
        grouped[monthKey] = {
          label: date.toLocaleString('default', { month: 'long' }),
          movies: []
        };
      }
      grouped[monthKey].movies.push(movie);
    });

    var keys = Object.keys(grouped).sort(function(a, b) {
      return new Date(b) - new Date(a);
    });

    keys.forEach(function(key, index) {
      var group = grouped[key];
      var section = document.createElement('div');
      var isOpen = state.openMonths.has(key);
      section.className = 'monthSection' + (isOpen ? ' active' : '');

      var moviesHtml = '';
      group.movies.forEach(function(movie) {
        var date = new Date(movie.d);
        var day = date.getDate();
        var month = date.toLocaleString('default', { month: 'short' });
        moviesHtml += '<div class="movie" data-id="' + esc(movie.id) + '">'
          + '<img src="' + img(movie.sp) + '" loading="lazy">'
          + '<div class="movieDate"><span class="day">' + day + '</span> ' + month
          + (/^Rewatch/i.test(movie.w) ? ' <span class="rewatch">R</span>' : '')
          + '</div>'
          + '</div>';
      });

      section.innerHTML = '<div class="monthHead">'
        + '<div class="monthLeft"><div class="monthArrow">&rsaquo;</div>'
        + '<h2>' + esc(group.label) + '</h2></div>'
        + '<span class="count">' + group.movies.length + '</span></div>'
        + '<div class="monthMovies"><div class="moviesGridWrap"><div class="moviesGrid">' + moviesHtml + '</div></div></div>';

      section.querySelectorAll('.movie').forEach(function(card) {
        card.onclick = function() {
          var movie = state.movies.find(function(m) { return m.id === card.dataset.id; });
          if (movie) openMeta(movie);
        };
      });

      section.querySelector('.monthHead').onclick = function(e) {
        if (e.target.closest('.movie')) return;
        var isActive = section.classList.toggle('active');
        if (isActive) {
          state.openMonths.add(key);
        } else {
          state.openMonths.delete(key);
        }
      };

      library.append(section);
    });
  }

  loadMovies();
  renderMovies();

  // ========= BACK BUTTON (popstate) =========

  var overlayStack = [];

  function pushOverlay(closeFn) {
    overlayStack.push(closeFn);
    history.pushState({ overlay: true }, '');
  }

  window.addEventListener('popstate', function() {
    if (overlayStack.length > 0) {
      var close = overlayStack.pop();
      close();
    }
  });

  // ========= ADD MODAL =========

  $('navAdd').onclick = function() {
    modal.classList.add('active');
    document.body.classList.add('no-scroll');
    queryInput.focus();
    pushOverlay(closeModal);
  };

  $('closeBtn').onclick = function() {
    overlayStack = overlayStack.filter(function(fn) { return fn !== closeModal; });
    history.back();
  };

  function closeModal() {
    modal.classList.remove('active');
    document.body.classList.remove('no-scroll');
    queryInput.value = '';
    yearInput.value = '';
    results.innerHTML = '';
    clearQuery.classList.remove('visible');
    queryInput.blur();
  }

  // ========= SEARCH =========

  var debounce;
  var clearQuery = $('clearQuery');

  queryInput.addEventListener('input', function() {
    clearQuery.classList.toggle('visible', queryInput.value.length > 0);
    clearTimeout(debounce);
    debounce = setTimeout(searchMovies, 180);
  });

  clearQuery.onclick = function() {
    queryInput.value = '';
    clearQuery.classList.remove('visible');
    results.innerHTML = '';
    queryInput.focus();
  };

  async function searchMovies() {
    var q = queryInput.value.trim();
    if (q.length < 2) {
      results.innerHTML = '';
      return;
    }

    showLoading(results);

    // Detect IMDB link or ID (e.g. tt0133093 or https://www.imdb.com/title/tt0133093/)
    var imdbMatch = q.match(/(tt\d{7,})/i);
    if (imdbMatch) {
      var findData = await tmdb('https://api.themoviedb.org/3/find/' + imdbMatch[1] + '?api_key=' + API + '&external_source=imdb_id');
      if (findData && findData.movie_results && findData.movie_results.length > 0) {
        var movie = findData.movie_results[0];
        openRating(movie);
        results.innerHTML = '';
        return;
      } else {
        showError(results, 'No movie found for that IMDB ID.');
        return;
      }
    }

    var url = 'https://api.themoviedb.org/3/search/movie?api_key=' + API + '&query=' + encodeURIComponent(q);
    if (yearInput.value) url += '&year=' + yearInput.value;

    var data = await tmdb(url);

    if (!data) {
      showError(results, 'Could not reach TMDB. Check your connection.');
      return;
    }

    var items = (data.results || []).filter(function(m) { return m.poster_path; }).slice(0, 20);

    if (items.length === 0) {
      results.innerHTML = '<div class="errorMsg" style="grid-column:1/-1;color:#777;">No results found</div>';
      return;
    }

    results.innerHTML = '';
    items.forEach(function(movie) {
      var card = document.createElement('div');
      card.className = 'result';
      card.innerHTML = '<img src="' + img(movie.poster_path, 'w342') + '" loading="lazy">';
      card.onclick = function() { openRating(movie); };
      results.append(card);
    });
  }

  // ========= WATCH COUNT =========

  function watchType(title) {
    var count = state.movies.filter(function(m) { return m.t === title; }).length;
    if (count === 0) return '1st Watch';
    return 'Rewatch \u00b7 ' + (count + 1) + 'x';
  }

  // ========= RATING =========

  function openRating(movie) {
    var old = document.querySelector('.ratingSheet');
    if (old) old.remove();

    var sheet = document.createElement('div');
    sheet.className = 'ratingSheet';

    var ratesHtml = '';
    [0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5].forEach(function(v) {
      ratesHtml += '<button>' + v + '</button>';
    });

    sheet.innerHTML = '<div class="sheetBg"></div>'
      + '<div class="sheet">'
      + '<img src="' + img(movie.poster_path) + '">'
      + '<h3>' + esc(movie.title) + '</h3>'
      + '<div class="rates">' + ratesHtml + '</div>'
      + '<label class="sheetToggle">'
      + '<input type="checkbox" id="rewatchToggle">'
      + '<div class="toggle-track"></div>'
      + 'Rewatch</label>'
      + '<button class="sheetAdd">Add Movie</button>'
      + '</div>';

    document.body.append(sheet);

    var rating = null;
    var addBtn = sheet.querySelector('.sheetAdd');

    pushOverlay(function() { sheet.remove(); });

    sheet.querySelectorAll('.rates button').forEach(function(btn) {
      btn.onclick = function() {
        sheet.querySelectorAll('.rates button').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        rating = btn.textContent;
        addBtn.classList.add('enabled');
      };
    });

    sheet.querySelector('.sheetBg').onclick = function() { history.back(); };

    addBtn.onclick = async function() {
      if (!rating) return;

      addBtn.textContent = 'Adding...';
      addBtn.disabled = true;

      var d = await tmdb(
        'https://api.themoviedb.org/3/movie/' + movie.id + '?api_key=' + API + '&append_to_response=credits,images'
      );

      if (!d) {
        showError(sheet.querySelector('.sheet'), 'Failed to fetch movie details.');
        addBtn.textContent = 'Add Movie';
        addBtn.disabled = false;
        return;
      }

      // Calculate watch type BEFORE adding
      var isRewatch = sheet.querySelector('#rewatchToggle').checked;
      var watch;
      if (isRewatch) {
        var prevCount = state.movies.filter(function(m) { return m.t === (d.title || ''); }).length;
        watch = 'Rewatch · ' + (prevCount + 1) + 'x';
      } else {
        watch = watchType(d.title || '');
      }

      state.movies.unshift({
        id: crypto.randomUUID(),
        tmdb_id: String(d.id || ''),
        imdb_id: d.imdb_id || '',
        t: d.title || '',
        yr: (d.release_date || '').slice(0, 4),
        rt: d.runtime || 0,
        g: (d.genres || []).map(function(x) { return x.name; }).join(', '),
        dr: ((d.credits && d.credits.crew ? d.credits.crew.find(function(x) { return x.job === 'Director'; }) : null) || {}).name || '',
        c: (d.credits && d.credits.cast ? d.credits.cast.slice(0, 10).map(function(x) { return x.name; }) : []).join(', '),
        lg: d.original_language || '',
        ct: (d.production_countries && d.production_countries[0] ? d.production_countries[0].name : ''),
        r: rating,
        w: watch,
        d: watchDate.value,
        sp: d.poster_path || ''
      });

      save();
      renderMovies();
      sheet.remove();
      closeModal();
      overlayStack = [];
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  }

  // ========= META =========

  function openMeta(movie) {
    state.current = movie;
    metaModal.classList.add('active');
    document.body.classList.add('no-scroll');
    document.querySelector('.meta').classList.remove('editing');
    pushOverlay(closeMeta);

    $('mPoster').src = img(movie.sp);
    $('mTitle').textContent = movie.t;
    $('mRating').textContent = movie.r + '/5';
    $('mYear').textContent = movie.yr;
    $('mRun').textContent = movie.rt + 'm';
    $('mGenre').textContent = movie.g;
    $('mDirector').textContent = movie.dr;
    $('mLang').textContent = movie.lg;
    $('mCountry').textContent = movie.ct;
    $('mWatch').textContent = movie.w;
    $('mLogged').textContent = movie.d;
    $('mCast').textContent = movie.c;

    $('eDirector').value = movie.dr;
    $('eLang').value = movie.lg;
    $('eCountry').value = movie.ct;
    $('eWatch').checked = /^Rewatch/i.test(movie.w);
    $('eLogged').value = movie.d;
    $('eCast').value = movie.c;
  }

  function closeMeta() {
    metaModal.classList.remove('active');
    document.body.classList.remove('no-scroll');
  }

  // ========= EDIT =========

  function buildRatingEdit(currentRating) {
    var container = $('eRating');
    container.innerHTML = '';
    [0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5].forEach(function(v) {
      var btn = document.createElement('button');
      btn.textContent = v;
      if (String(v) === String(currentRating)) btn.classList.add('active');
      btn.onclick = function() {
        container.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
      };
      container.append(btn);
    });
  }

  $('editBtn').onclick = function() {
    document.querySelector('.meta').classList.add('editing');
    buildRatingEdit(state.current.r);
  };

  $('saveBtn').onclick = function() {
    var m = state.current;
    var activeRating = $('eRating').querySelector('button.active');
    if (activeRating) m.r = activeRating.textContent;
    m.dr = $('eDirector').value;
    m.lg = $('eLang').value;
    m.ct = $('eCountry').value;
    if ($('eWatch').checked) {
      var prevCount = state.movies.filter(function(x) { return x.t === m.t && x.id !== m.id; }).length;
      m.w = 'Rewatch · ' + (prevCount + 1) + 'x';
    } else {
      m.w = '1st Watch';
    }
    m.d = $('eLogged').value;
    m.c = $('eCast').value;
    save();
    renderMovies();
    openMeta(m);
  };

  // ========= DELETE =========

  $('deleteBtn').onclick = function() {
    if (!confirm('Delete "' + state.current.t + '" ?')) return;
    var delId = state.current.id;
    state.movies = state.movies.filter(function(m) { return m.id !== delId; });
    save();
    renderMovies();
    closeMeta();
  };

  // ========= POSTERS =========

  $('changePoster').onclick = async function() {
    var old = document.querySelector('.posterPicker');
    if (old) old.remove();

    var picker = document.createElement('div');
    picker.className = 'posterPicker';

    picker.innerHTML = '<div class="posterBg"></div>'
      + '<div class="posterSheet"><div class="posterSheetHandle"></div><div class="posterGrid" style="text-align:center;padding:20px;color:var(--muted);">Loading posters...</div></div>';

    document.body.append(picker);
    requestAnimationFrame(function() { picker.classList.add('active'); });
    pushOverlay(function() { picker.remove(); });

    var tmdbId = state.current.tmdb_id;
    var posters = [];
    if (tmdbId) {
      var d = await tmdb('https://api.themoviedb.org/3/movie/' + tmdbId + '/images?api_key=' + API);
      if (d && d.posters) {
        posters = d.posters.map(function(p) { return { u: p.file_path, l: p.iso_639_1 || 'N/A' }; });
      }
    }

    if (!picker.isConnected) return;

    var grid = picker.querySelector('.posterGrid');
    if (posters.length === 0) {
      grid.textContent = 'No alternative posters found.';
      return;
    }

    var gridHtml = '';
    posters.forEach(function(p, i) {
      var isActive = state.current.sp === p.u ? ' active' : '';
      gridHtml += '<div class="posterItem' + isActive + '" data-i="' + i + '">'
        + '<img src="' + img(p.u, 'w342') + '" loading="lazy">'
        + '<div class="posterLang">' + esc(p.l) + '</div>'
        + '</div>';
    });
    grid.innerHTML = gridHtml;
    grid.style.textAlign = '';
    grid.style.padding = '';

    picker.querySelectorAll('.posterItem').forEach(function(card) {
      card.onclick = function() {
        var selected = posters[Number(card.dataset.i)].u;
        state.current.sp = selected;
        save();
        renderMovies();
        $('mPoster').src = img(selected);
        history.back();
      };
    });

    picker.querySelector('.posterBg').onclick = function() { history.back(); };
  };

  // ========= AUTO-HIDE NAV =========

  var navBar = document.querySelector('.bottomNav');
  var lastScroll = 0;
  var scrollTicking = false;

  window.addEventListener('scroll', function() {
    if (scrollTicking) return;
    scrollTicking = true;
    requestAnimationFrame(function() {
      var st = window.scrollY;
      if (st > lastScroll && st > 80) {
        navBar.classList.add('hidden');
      } else {
        navBar.classList.remove('hidden');
      }
      lastScroll = st;
      scrollTicking = false;
    });
  });

  // ========= CLOSE META =========

  metaModal.onclick = function(e) {
    if (e.target === metaModal) closeMeta();
  };

  // ========= KEYBOARD =========

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlayStack.length > 0) {
      history.back();
    }
  });

})();
</script>
</body>
</html>
