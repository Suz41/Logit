<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Log!t - Stats</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
rel="stylesheet">
<style>

:root{
--bg:#000;
--surface:#111;
--surface2:#191919;
--text:#e5e5e5;
--muted:#636366;
--dim:#48484a;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
min-height:100%;
background:var(--bg);
color:var(--text);
font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
}

body::-webkit-scrollbar{display:none;}

/* ========= HEADER ========= */

.header{
position:sticky;
top:0;
z-index:20;
background:rgba(0,0,0,0.88);
-webkit-backdrop-filter:saturate(180%) blur(20px);
backdrop-filter:saturate(180%) blur(20px);
border-bottom:0.5px solid rgba(255,255,255,0.06);
}

.headerRow{
height:52px;
padding:0 14px;
display:flex;
align-items:center;
justify-content:space-between;
}

.headerTitle{
font-size:17px;
font-weight:600;
letter-spacing:-0.3px;
position:absolute;
left:50%;
transform:translateX(-50%);
}

.headBtn{
width:32px;
height:32px;
border:none;
border-radius:50%;
background:var(--surface);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* ========= LAYOUT ========= */

.mapWrap{
padding:8px 12px;
display:flex;
flex-direction:column;
gap:6px;
}

/* ========= HERO ========= */

.hero{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
}

.statBox{
background:var(--surface);
border-radius:6px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:14px 6px;
text-align:center;
}

.statBox h2{
font-size:20px;
font-weight:700;
line-height:1;
margin-bottom:6px;
color:#fff;
}

.statBox p{
font-size:9px;
color:var(--muted);
text-transform:uppercase;
font-weight:600;
letter-spacing:0.5px;
}

.timeSub{
font-size:7px;
font-weight:500;
color:var(--dim);
margin-top:4px;
line-height:1.2;
}

/* ========= PEOPLE ========= */

.peopleGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.peopleCard{
background:var(--surface);
border-radius:6px;
padding:12px;
overflow:hidden;
}

.sectionTitle{
font-size:11px;
font-weight:600;
color:var(--muted);
text-transform:uppercase;
letter-spacing:0.3px;
margin-bottom:8px;
}

.peopleList{
display:flex;
flex-direction:column;
}

.person{
cursor:pointer;
display:flex;
flex-direction:column;
align-items:flex-start;
overflow:hidden;
padding:8px 0;
border-bottom:0.5px solid rgba(255,255,255,0.04);
}

.personMovies{
max-height:0;
overflow:hidden;
transition:max-height 0.25s ease,padding 0.25s ease;
flex-wrap:wrap;
gap:4px;
padding-left:38px;
width:100%;
}

.person.active .personMovies{
max-height:200px;
padding-top:6px;
}

.movieChip{
font-size:9px;
color:var(--dim);
}

.person:last-child{border-bottom:none;}

.personTop{
width:100%;
display:flex;
align-items:center;
gap:8px;
}

.person img{
width:30px;
height:30px;
border-radius:50%;
object-fit:cover;
background:var(--surface2);
flex-shrink:0;
}

.personInfo{
flex:1;
overflow:hidden;
}

.personName{
font-size:12px;
font-weight:500;
color:var(--text);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.personCount{
font-size:10px;
color:var(--muted);
margin-top:1px;
}


/* ========= META ========= */

.metaGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.metaCard{
background:var(--surface);
border-radius:6px;
padding:12px;
overflow:hidden;
}

.metaHead{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
}

.metaTitle{
font-size:11px;
font-weight:600;
color:var(--muted);
text-transform:uppercase;
letter-spacing:0.3px;
}

.metaTotal{
font-size:10px;
font-weight:600;
color:var(--dim);
}

.metaWrap{
display:flex;
flex-direction:column;
}

.metaItem{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
padding:8px 0;
border-bottom:0.5px solid rgba(255,255,255,0.04);
cursor:pointer;
}

.metaMovies{
max-height:0;
overflow:hidden;
transition:max-height 0.25s ease;
width:100%;
}

.metaItem.active .metaMovies{
max-height:200px;
padding-top:6px;
}

.metaMovie{
font-size:9px;
color:var(--dim);
}

.metaItem:last-child{border-bottom:none;}

.metaName{
font-size:12px;
font-weight:500;
color:var(--text);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
flex:1;
}

.metaCount{
font-size:11px;
font-weight:600;
color:var(--muted);
margin-left:8px;
}


.empty{
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:var(--dim);
text-align:center;
padding:20px;
}

/* ========= BUTTONS ========= */

.actionBtn{
height:36px;
border:none;
border-radius:6px;
background:var(--surface);
color:var(--text);
font-size:12px;
font-weight:600;
cursor:pointer;
font-family:'Inter',sans-serif;
}

.actionBtn:active{opacity:0.7;}

.actionBtn.destructive{
background:#2a0a0e;
color:#ff453a;
}

/* ========= IMPORT MODAL ========= */

.importModal{
position:fixed;
inset:0;
background:var(--bg);
z-index:350;
padding:12px;
display:none;
flex-direction:column;
opacity:0;
transition:opacity .2s;
}

.importModal.active{display:flex;opacity:1;}

.importTextarea{
flex:1;
width:100%;
background:var(--surface);
border:none;
outline:none;
border-radius:8px;
padding:14px;
color:#fff;
font-family:'Inter',sans-serif;
font-size:13px;
resize:none;
line-height:1.5;
}

.importTextarea::placeholder{color:var(--dim);}

.importFooter{
display:flex;
gap:8px;
margin-top:10px;
align-items:center;
}

.importBtn{
flex:1;
height:44px;
border:none;
border-radius:8px;
background:#fff;
color:#000;
font-size:14px;
font-weight:700;
cursor:pointer;
}

.importBtn:disabled{opacity:0.4;cursor:default;}

.importStatus{
font-size:11px;
color:var(--muted);
text-align:center;
margin-top:8px;
min-height:16px;
}


</style>
</head>

<body>

<div class="headerRow">
<button class="headBtn" onclick="if(history.length>1)history.back();else location.href='index.html'">

</button>
<span class="headerTitle">Stats</span>

<!-- ========= IMPORT ========= -->
<div class="importModal" id="importModal">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <h3 style="font-size:16px;font-weight:700;">Import Movies</h3>
    <button class="headBtn" onclick="closeImportModal()" style="width:34px;height:34px;">&times;</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <label style="flex:1;height:44px;border-radius:12px;background:var(--surface-light);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:600;color:#fff;gap:6px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload JSON
      <input type="file" id="fileInput" accept=".json" style="display:none;">
    </label>
  </div>
  <textarea class="importTextarea" id="importText" placeholder="Or paste text here...&#10;&#10;JSON (from Log!t export):&#10;Paste the full exported JSON array — imports directly with all data.&#10;&#10;One movie per line:&#10;tt0133093  4.5  2024-05-15    (IMDB ID)&#10;tmdb:27205  5  2024-01-10      (TMDB ID)&#10;#550                       (TMDB ID with #)&#10;Inception 3.5&#10;Interstellar - 5/5 - 2024-01-10&#10;Fight Club  2023-12-25  4&#10;&#10;Pipe format:&#10;Movie Name | Rating | IMDb/TMDb_ID | Date | RewatchStatus&#10;The Matrix | 5 | tmdb:603 | 2024-05-15 | rewatch&#10;&#10;Ratings default to 3. Dates default to today."></textarea>
  <div class="importFooter">
    <button class="importBtn" id="importStartBtn">Import</button>
  </div>
  <div class="importStatus" id="importStatus"></div>
</div>

<section class="mapWrap">

<div class="hero">

<div class="statBox">

<h2 id="movieCount">
0
</h2>

<p>
Films

</div>

<div class="statBox">

</h2>

</div>

<div class="peopleGrid">

</div>

</div>

<div style="padding:10px;display:flex;flex-direction:column;gap:6px;margin-bottom:30px;">

<script>

/* ========= MOVIES ========= */

let movies = JSON.parse(localStorage.getItem("movies")) || [];

function loadMovies() {
  var cached = localStorage.getItem('movies');
  movies = cached ? JSON.parse(cached) : [];
}

function init() {
loadMovies();

/* ========= DATA ========= */

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const countryCount={};
const directorCount={};
const actorCount={};

const genreCount={};
const langCount={};
const langMovies={};
const regionCount={};
const regionMovies={};

/* ========= LOOP ========= */

movies.forEach(movie=>{

/* COUNTRY */

if(movie.ct){

let country=movie.ct;

if(country==="United States of America"){

country="United States";

}

countryCount[country]=
(countryCount[country]||0)+1;
if(!regionMovies[country])regionMovies[country]=[];
regionMovies[country].push(movie.t);

}

/* GENRES */

if(movie.g){

movie.g
.split(',')
.forEach(g=>{

const genre=g.trim();

if(!genre)return;

genreCount[genre]=
(genreCount[genre]||0)+1;

});

}

/* LANGUAGES */

if(movie.lg){

movie.lg
.split(',')
.forEach(l=>{

const lang=l.trim();

if(!lang)return;

langCount[lang]=
(langCount[lang]||0)+1;
if(!langMovies[lang])langMovies[lang]=[];
langMovies[lang].push(movie.t);

});

}

/* DIRECTORS */

if(movie.director?.name){

const name=
movie.director.name;

if(!directorCount[name]){

directorCount[name]={
img:movie.director.img||'',
movies:new Set()
};

}

directorCount[name].movies.add(
movie.t
);

}

else if(movie.dr){

const name=movie.dr;

if(!directorCount[name]){

directorCount[name]={
img:'',
movies:new Set()
};

}

directorCount[name].movies.add(
movie.t
);

}

/* ACTORS */

if(movie.cast){

movie.cast
.forEach(actor=>{

const name=actor.name;

if(!name)return;

if(!actorCount[name]){

actorCount[name]={
img:actor.img||'',
movies:new Set()
};

}

actorCount[name].movies.add(
movie.t
);

});

}

else if(movie.c){

movie.c
.split(',')
.forEach(actor=>{

const name=actor.trim();

if(!name)return;

if(!actorCount[name]){

actorCount[name]={
img:'',
movies:new Set()
};

}

actorCount[name].movies.add(
movie.t
);

});

}

});

/* ========= STATS ========= */

const totalMovies=
movies.length;

const totalRuntime=
movies.reduce((a,b)=>{

return a+(Number(b.rt)||0);

},0);

const totalRating=
movies.reduce((a,b)=>{

return a+(Number(b.r)||0);

},0);

const avgRating=
movies.length
?(totalRating/movies.length).toFixed(1)
:"0.0";

/* ========= TIME ========= */

function formatTime(mins){

if(!mins){

return{
main:"0h",
sub:"0 min • 0 days • 0 years"
};

}

const hours=
(mins/60).toFixed(1);

const days=
(mins/1440).toFixed(1);

const years=
(mins/525600).toFixed(2);

return{

main:`${hours}h`,

sub:`
${mins.toLocaleString()} min
•
${days} days
•
${years} years
`

};

}

document.getElementById(
"movieCount"
).innerText=
totalMovies;

const timeData=
formatTime(totalRuntime);

document.getElementById(
"timeCount"
).innerHTML=`

${timeData.main}

<div class="timeSub">

${timeData.sub}

</div>

`;

document.getElementById(
"ratingAvg"
).innerText=
avgRating;

/* ========= TOP PEOPLE ========= */

const topDirectors=
Object.entries(directorCount)
.sort((a,b)=>

b[1].movies.size-
a[1].movies.size

)
.slice(0,5);

const topActors=
Object.entries(actorCount)
.sort((a,b)=>

b[1].movies.size-
a[1].movies.size

)
.slice(0,5);

/* ========= IMAGES ========= */

async function fetchPersonImage(name){

try{

const res=await fetch(

`https://api.themoviedb.org/3/search/person?api_key=${API}&query=${encodeURIComponent(name)}`

);

const data=await res.json();

const path=
data.results?.[0]?.profile_path;

return path
?`https://image.tmdb.org/t/p/w185${path}`
:'https://placehold.co/80x80/1a1a1a/888?text=%20';

}catch{

return'https://placehold.co/80x80/1a1a1a/888?text=%20';

}

}

/* ========= RENDER PEOPLE ========= */

async function renderPeople(){

const dList=
document.getElementById(
"directorList"
);

const aList=
document.getElementById(
"actorList"
);

/* DIRECTORS */

for(const[director,data]of topDirectors){

const img=
data.img
?data.img
:await fetchPersonImage(
director
);

dList.innerHTML+=`

<div class="person" onclick="this.classList.toggle('active')">

<div class="personTop">

<img src="${img}">

<div class="personInfo">

<div class="personName">
${director}
</div>

<div class="personCount">
${data.movies.size} films
</div>

</div>

</div>

<div class="personMovies">

${[...data.movies]
.map(movie=>`
<span class="movieChip">${movie}</span>
`).join('')}

</div>

</div>

`;

}

/* ACTORS */

for(const[actor,data]of topActors){

const img=
data.img
?data.img
:await fetchPersonImage(
actor
);

aList.innerHTML+=`

<div class="person" onclick="this.classList.toggle('active')">

<div class="personTop">

<img src="${img}">

<div class="personInfo">

<div class="personName">
${actor}
</div>

<div class="personCount">
${data.movies.size} films
</div>

</div>

</div>

<div class="personMovies">

${[...data.movies]
.map(movie=>`
<span class="movieChip">${movie}</span>
`).join('')}

</div>

</div>

`;

}

}

renderPeople();

/* ========= TOGGLE ========= */

document.addEventListener(
'click',
e=>{

const person=
e.target.closest('.person');

if(!person)return;

person.classList.toggle(
'active'
);

}
);

/* ========= LANGUAGE MAP ========= */

const langMap={aa:'Afar',ab:'Abkhaz',af:'Afrikaans',ak:'Akan',am:'Amharic',ar:'Arabic',an:'Aragonese',as:'Assamese',av:'Avaric',ay:'Aymara',az:'Azerbaijani',ba:'Bashkir',be:'Belarusian',bg:'Bulgarian',bh:'Bihari',bi:'Bislama',bm:'Bambara',bn:'Bengali',bo:'Tibetan',br:'Breton',bs:'Bosnian',ca:'Catalan',ce:'Chechen',ch:'Chamorro',co:'Corsican',cr:'Cree',cs:'Czech',cv:'Chuvash',cy:'Welsh',da:'Danish',de:'German',dv:'Divehi',dz:'Dzongkha',ee:'Ewe',el:'Greek',en:'English',eo:'Esperanto',es:'Spanish',et:'Estonian',eu:'Basque',fa:'Persian',ff:'Fula',fi:'Finnish',fj:'Fijian',fo:'Faroese',fr:'French',fy:'Western Frisian',ga:'Irish',gd:'Scottish Gaelic',gl:'Galician',gn:'Guarani',gu:'Gujarati',gv:'Manx',ha:'Hausa',he:'Hebrew',hi:'Hindi',ho:'Hiri Motu',hr:'Croatian',ht:'Haitian',hu:'Hungarian',hy:'Armenian',hz:'Herero',ia:'Interlingua',id:'Indonesian',ie:'Interlingue',ig:'Igbo',ii:'Sichuan Yi',ik:'Inupiauk',io:'Ido',is:'Icelandic',it:'Italian',iu:'Inuktitut',ja:'Japanese',jv:'Javanese',ka:'Georgian',kg:'Kongo',ki:'Kikuyu',kj:'Kwanyama',kk:'Kazakh',kl:'Kalaallisut',km:'Khmer',kn:'Kannada',ko:'Korean',kr:'Kanuri',ks:'Kashmiri',ku:'Kurdish',kv:'Komi',kw:'Cornish',ky:'Kyrgyz',la:'Latin',lb:'Luxembourgish',lg:'Ganda',li:'Limburgish',ln:'Lingala',lo:'Lao',lt:'Lithuanian',lu:'Luba-Katanga',lv:'Latvian',mg:'Malagasy',mh:'Marshallese',mi:'Maori',mk:'Macedonian',ml:'Malayalam',mn:'Mongolian',mr:'Marathi',ms:'Malay',mt:'Maltese',my:'Burmese',na:'Nauru',nb:'Norwegian Bokmål',nd:'North Ndebele',ne:'Nepali',ng:'Ndonga',nl:'Dutch',nn:'Norwegian Nynorsk',no:'Norwegian',nr:'South Ndebele',nv:'Navajo',ny:'Chichewa',oc:'Occitan',oj:'Ojibwe',om:'Oromo',or:'Oriya',os:'Ossetian',pa:'Panjabi',pi:'Pali',pl:'Polish',ps:'Pashto',pt:'Portuguese',qu:'Quechua',rm:'Romansh',rn:'Kirundi',ro:'Romanian',ru:'Russian',rw:'Kinyarwanda',sa:'Sanskrit',sc:'Sardinian',sd:'Sindhi',se:'Northern Sami',sg:'Sango',si:'Sinhala',sk:'Slovak',sl:'Slovenian',sm:'Samoan',sn:'Shona',so:'Somali',sq:'Albanian',sr:'Serbian',ss:'Swati',st:'Southern Sotho',su:'Sundanese',sv:'Swedish',sw:'Swamil',ta:'Tamil',te:'Telugu',tg:'Tajik',th:'Thai',ti:'Tigrinya',tk:'Turkmen',tl:'Tagalog',tn:'Tswana',to:'Tonga',tr:'Turkish',ts:'Tsonga',tt:'Tatar',tw:'Twi',ty:'Tahitian',ug:'Uyghur',uk:'Ukrainian',ur:'Urdu',uz:'Uzbek',ve:'Venda',vi:'Vietnamese',vo:'Volapük',wa:'Walloon',wo:'Wolof',xh:'Xhosa',yi:'Yiddish',yo:'Yoruba',za:'Zhuang',zh:'Chinese',zu:'Zulu',xx:'No Language','n/a':'Unknown'};

/* ========= GENRES ========= */

const genreWrap=
document.getElementById(
"genreWrap"
);

document.getElementById(
"genreTotal"
).innerText=
Object.keys(genreCount).length;

Object.entries(genreCount)
.sort((a,b)=>b[1]-a[1])
.forEach(([genre,count])=>{

genreWrap.innerHTML+=`
<div class="metaItem">
<span class="metaName">${genre}</span>
<span class="metaCount">${count}</span>
</div>
`;

});

/* ========= LANGUAGES ========= */

const langWrap=
document.getElementById(
"langWrap"
);

document.getElementById(
"langTotal"
).innerText=
Object.keys(langCount).length;

Object.entries(langCount)
.sort((a,b)=>b[1]-a[1])
.forEach(([lang,count])=>{

var fullName=langMap[lang.toLowerCase()]||lang.toUpperCase();
var moviesHtml=(langMovies[lang]||[]).map(function(m){return '<span class="metaMovie">'+esc(m)+'</span>';}).join(' ');

langWrap.innerHTML+=`
<div class="metaItem" onclick="this.classList.toggle('active')">
<span class="metaName">${fullName}</span>

/* ========= IMPORT ========= */

var API=localStorage.getItem('tmdb_key')||'';

function openImportModal(){

document.body.style.overflow='hidden';

function parseImportLine(line){
line=line.trim();
if(!line)return null;

// Pipe-delimited format: Movie Name | Rating | IMDb/TMDb_ID | Date | RewatchStatus
if(line.includes('|')){
var parts=line.split('|').map(function(p){return p.trim();});
if(parts.length>=3){
var title=parts[0]||'';
var rating=parts[1]?parseFloat(parts[1]):null;
var idField=parts[2]||'';
var date=parts[3]||null;
var rewatch=parts[4]||null;

var tmdbId=null;
var imdbId=null;

var tmdbMatch=idField.match(/tmdb[:\s]*(\d+)/i);
if(tmdbMatch)tmdbId=tmdbMatch[1];
var imdbMatch=idField.match(/\b(tt\d{7,8})\b/i);
if(imdbMatch)imdbId=imdbMatch[1];
if(!tmdbId&&!imdbId&&/^\d+$/.test(idField))tmdbId=idField;

var year=null;
if(date){var dp=date.match(/\d{4}/);if(dp)year=dp[0];}

if(!title&&!tmdbId&&!imdbId)return null;

var isRewatch=false;
if(rewatch){var rw=rewatch.toLowerCase();if(rw==='rewatch'||rw==='re'||rw==='rw'||rw==='yes'||rw==='y')isRewatch=true;}

return{title:title,rating:rating,date:date,year:year,tmdbId:tmdbId,imdbId:imdbId,rewatch:isRewatch};
}
}

var date=null;
var rating=null;
var year=null;
var tmdbId=null;
var imdbId=null;
var title=line;

var imdbMatch=title.match(/\b(tt\d{7,8})\b/i);
if(imdbMatch){imdbId=imdbMatch[1];title=title.replace(imdbMatch[0],'');}

var tmdbMatch=title.match(/\b(?:tmdb[:\s]*|#)(\d{2,})\b/i);
if(tmdbMatch){tmdbId=tmdbMatch[1];title=title.replace(tmdbMatch[0],'');}

var dateMatch=line.match(/\b(\d{4}[-\/]\d{1,2}[-\/]\d{1,2})\b/);
if(!dateMatch)dateMatch=line.match(/\b(\d{1,2}[-\/]\d{1,2}[-\/]\d{4})\b/);
if(!dateMatch)dateMatch=line.match(/\b((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{1,2}[,\s]+\d{4})\b/i);
if(dateMatch){date=dateMatch[1];title=title.replace(dateMatch[0],'');}

var ratingMatch=line.match(/(?:★\s*)?(\d(?:\.\d)?)\s*\/\s*5/);
if(!ratingMatch)ratingMatch=line.match(/(?:rating[:\s]*)?(\d(?:\.\d)?)(?!\s*[\/\d])/i);
if(ratingMatch){var r=parseFloat(ratingMatch[1]);if(r>=0.5&&r<=5){rating=r;title=title.replace(ratingMatch[0],'');}}

var yearMatch=title.match(/\b(19\d{2}|20\d{2})\b/);
if(yearMatch&&!date){year=yearMatch[1];title=title.replace(yearMatch[0],'');}else if(date){var dp=date.match(/\d{4}/);if(dp)year=dp[0];}

title=title.replace(/^[\s,;:\-–—|]+|[\s,;:\-–—|]+$/g,'').replace(/\s{2,}/g,' ').trim();
if(!title&&!tmdbId&&!imdbId)return null;

return{title:title,rating:rating,date:date,year:year,tmdbId:tmdbId,imdbId:imdbId,rewatch:false};
}

function normalizeDate(d){
if(!d){var t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
if(d.match(/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/))return d.replace(/\//g,'-');
if(d.match(/^\d{1,2}[-\/]\d{1,2}[-\/]\d{4}$/)){var p=d.split(/[-\/]/);return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');}
var parsed=new Date(d);
if(!isNaN(parsed.getTime()))return parsed.getFullYear()+'-'+String(parsed.getMonth()+1).padStart(2,'0')+'-'+String(parsed.getDate()).padStart(2,'0');
var t2=new Date();return t2.getFullYear()+'-'+String(t2.getMonth()+1).padStart(2,'0')+'-'+String(t2.getDate()).padStart(2,'0');
}

function watchType(title){
var count=movies.filter(function(m){return m.t===title;}).length;
if(count===0)return'1st Watch';
return'Rewatch \u00b7 '+(count+1)+'x';
}

async function tmdb(url){
try{var r=await fetch(url);if(!r.ok)return null;return await r.json();}catch(e){return null;}
}

/* File upload handler */
document.getElementById('fileInput').addEventListener('change',function(e){
var file=e.target.files[0];
if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
document.getElementById('importText').value=ev.target.result;
document.getElementById('importStatus').textContent='File loaded: '+file.name;
};
reader.readAsText(file);
});

function isSlimExport(parsed){
return parsed.length>0&&parsed[0].tmdb_id!==undefined&&!parsed[0].p&&!parsed[0].g;
}

document.getElementById('importStartBtn').onclick=async function(){
var text=document.getElementById('importText').value.trim();
if(!text)return;

/* JSON import (exported from Log!t) */
if(text.charAt(0)==='['){
try{
var parsed=JSON.parse(text);
if(!Array.isArray(parsed))throw new Error();

/* Slim export — re-fetch full data from TMDB */
if(isSlimExport(parsed)){
if(!API){
document.getElementById('importStatus').textContent='TMDB API key required to import slim export. Set it from main page.';
return;
}
var btn=document.getElementById('importStartBtn');
btn.disabled=true;
var statusEl=document.getElementById('importStatus');
var existingTmdbIds=new Set(movies.map(function(m){return m.tmdb_id||'';}));
var existingIds=new Set(movies.map(function(m){return m.id;}));
var imported=0;
var failed=0;
var total=parsed.length;

for(var i=0;i<parsed.length;i++){
var entry=parsed[i];
if((!entry.t&&!entry.id)||!entry.tmdb_id){failed++;continue;}
if(existingIds.has(entry.id)||existingTmdbIds.has(entry.tmdb_id)){continue;}

statusEl.textContent='Fetching '+(i+1)+'/'+total+': '+entry.t;

try{
var detail=await tmdb('https://api.themoviedb.org/3/movie/'+entry.tmdb_id+'?api_key='+API+'&append_to_response=credits,images');
if(!detail){failed++;continue;}

var watch=entry.w||'1st Watch';

movies.unshift({
id:entry.id||crypto.randomUUID(),
tmdb_id:String(detail.id||entry.tmdb_id||''),
t:detail.title||entry.t||'',
yr:(detail.release_date||'').slice(0,4)||entry.yr||'',
rt:detail.runtime||0,
g:(detail.genres||[]).map(function(x){return x.name;}).join(', '),
dr:((detail.credits&&detail.credits.crew?detail.credits.crew.find(function(x){return x.job==='Director';}):null)||{}).name||'',
c:(detail.credits&&detail.credits.cast?detail.credits.cast.slice(0,10).map(function(x){return x.name;}):[]).join(', '),
lg:detail.original_language||'',
ct:(detail.production_countries&&detail.production_countries[0]?detail.production_countries[0].name:''),
r:entry.r||3,
w:watch,
d:entry.d||normalizeDate(null),
sp:detail.poster_path||entry.sp||'',
p:(detail.images&&detail.images.posters?detail.images.posters.map(function(p){return{u:p.file_path,l:p.iso_639_1||'N/A'};}):[])
});
imported++;
}catch(e){failed++;}
}

localStorage.setItem('movies',JSON.stringify(movies));
if(LogitSync.isConfigured())LogitSync.push(movies);
statusEl.textContent=imported+' imported'+(failed>0?', '+failed+' failed':'');
btn.disabled=false;
setTimeout(function(){closeImportModal();location.reload();},1500);
return;
}

/* Full JSON import (legacy format with all data) */
var count=0;
var existingIds=new Set(movies.map(function(m){return m.id;}));
var existingTmdbFull=new Set(movies.map(function(m){return m.tmdb_id||'';}));
parsed.forEach(function(m){
if(!m.t&&!m.id)return;
if(existingIds.has(m.id))return;
if(m.tmdb_id&&existingTmdbFull.has(m.tmdb_id))return;
movies.unshift(m);
count++;
});
localStorage.setItem('movies',JSON.stringify(movies));
if(LogitSync.isConfigured())LogitSync.push(movies);
document.getElementById('importStatus').textContent=count+' imported from JSON';
setTimeout(function(){closeImportModal();location.reload();},1500);
return;
}catch(e){
document.getElementById('importStatus').textContent='Invalid JSON format';
return;
}
}

var lines=text.split('\n').filter(function(l){return l.trim().length>0;});
if(lines.length===0)return;

if(!API){
document.getElementById('importStatus').textContent='TMDB import requires an API key. Set it from the main page.';
return;
}

var btn=document.getElementById('importStartBtn');
btn.disabled=true;
var statusEl=document.getElementById('importStatus');
var imported=0;
var failed=0;
var total=lines.length;

for(var i=0;i<lines.length;i++){
var entry=parseImportLine(lines[i]);
if(!entry){failed++;continue;}

statusEl.textContent='Importing '+(i+1)+'/'+total+': '+(entry.title||entry.tmdbId||entry.imdbId);

try{
var detail=null;

if(entry.tmdbId){
detail=await tmdb('https://api.themoviedb.org/3/movie/'+entry.tmdbId+'?api_key='+API+'&append_to_response=credits,images');
}else if(entry.imdbId){
var findData=await tmdb('https://api.themoviedb.org/3/find/'+entry.imdbId+'?api_key='+API+'&external_source=imdb_id');
if(findData&&findData.movie_results&&findData.movie_results.length>0){
var foundId=findData.movie_results[0].id;
detail=await tmdb('https://api.themoviedb.org/3/movie/'+foundId+'?api_key='+API+'&append_to_response=credits,images');
}
}else{
var searchUrl='https://api.themoviedb.org/3/search/movie?api_key='+API+'&query='+encodeURIComponent(entry.title);
if(entry.year)searchUrl+='&year='+entry.year;
var searchData=await tmdb(searchUrl);
if(!searchData||!searchData.results||searchData.results.length===0){failed++;continue;}

var titleLow=entry.title.toLowerCase();
var candidates=searchData.results.filter(function(m){return m.poster_path;});
if(candidates.length===0)candidates=searchData.results;

var result=candidates[0];
for(var ci=1;ci<candidates.length;ci++){
var c=candidates[ci];
var cTitle=(c.title||'').toLowerCase();
if(cTitle===titleLow&&(result.title||'').toLowerCase()!==titleLow){result=c;continue;}
if(entry.year&&c.release_date&&result.release_date){
var cYear=c.release_date.slice(0,4);
var rYear=result.release_date.slice(0,4);
if(cYear===entry.year&&rYear!==entry.year){result=c;}
}
}
detail=await tmdb('https://api.themoviedb.org/3/movie/'+result.id+'?api_key='+API+'&append_to_response=credits,images');
}
if(!detail){failed++;continue;}

var watch=entry.rewatch?'Rewatch':watchType(detail.title||'');

movies.unshift({
id:crypto.randomUUID(),
tmdb_id:String(detail.id||''),
t:detail.title||'',
yr:(detail.release_date||'').slice(0,4),
rt:detail.runtime||0,
g:(detail.genres||[]).map(function(x){return x.name;}).join(', '),
dr:((detail.credits&&detail.credits.crew?detail.credits.crew.find(function(x){return x.job==='Director';}):null)||{}).name||'',
c:(detail.credits&&detail.credits.cast?detail.credits.cast.slice(0,10).map(function(x){return x.name;}):[]).join(', '),
lg:detail.original_language||'',
ct:(detail.production_countries&&detail.production_countries[0]?detail.production_countries[0].name:''),
r:entry.rating||3,
w:watch,
d:normalizeDate(entry.date),
sp:detail.poster_path||'',
p:(detail.images&&detail.images.posters?detail.images.posters.map(function(p){return{u:p.file_path,l:p.iso_639_1||'N/A'};}):[])
});

imported++;
}catch(e){failed++;}
}

localStorage.setItem('movies',JSON.stringify(movies));
if(LogitSync.isConfigured())LogitSync.push(movies);
statusEl.textContent=imported+' imported'+(failed>0?', '+failed+' failed':'');
btn.disabled=false;

setTimeout(function(){closeImportModal();location.reload();},1500);
};

function setApiKey(){

var key=prompt('Enter your TMDB API Key:',current);
if(key!==null){
key=key.trim();
if(key){
localStorage.setItem('tmdb_key',key);
alert('API key saved! Reload to apply.');

}

var exportModal = document.createElement('div');
exportModal.className = 'importModal';
exportModal.id = 'exportModal';
exportModal.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">'
  + '<h3 style="font-size:16px;font-weight:700;">Export Movies</h3>'
  + '<button class="headBtn" onclick="closeExportModal()" style="width:34px;height:34px;">&times;</button>'
  + '</div>'
  + '<div style="display:flex;flex-direction:column;gap:8px;margin-top:20px;">'
  + '<button onclick="doExport(\'json\')" style="height:48px;border:none;border-radius:12px;background:var(--surface-light);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">JSON</button>'
  + '<button onclick="doExport(\'txt\')" style="height:48px;border:none;border-radius:12px;background:var(--surface-light);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">TXT</button>'
  + '</div>';

function exportMovies(){
  document.getElementById('exportModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeExportModal(){
  document.getElementById('exportModal').classList.remove('active');
  document.body.style.overflow = '';
}

function doExport(format){
  var data, blob, ext, mime;
  if(format === 'json'){
    var slim = movies.map(function(m){
      return{ id:m.id, t:m.t, tmdb_id:m.tmdb_id||'', imdb_id:m.imdb_id||'', yr:m.yr, r:m.r, d:m.d, w:m.w, sp:m.sp };
    });
    data = JSON.stringify(slim, null, 2);
    mime = 'application/json';
    ext = 'json';
  } else {
    var lines = movies.map(function(m){
      return m.t + ' | ' + (m.r||'') + '/5 | ' + (m.d||'') + ' | ' + (m.w||'') + ' | ' + (m.yr||'') + ' | ' + (m.tmdb_id||'') + ' | ' + (m.imdb_id||'');
    });
    data = lines.join('\n');
    mime = 'text/plain';
    ext = 'txt';
  }
  var blob = new Blob([data], {type: mime});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'logit-movies-' + new Date().toISOString().slice(0, 10) + '.' + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeExportModal();
}

</script>
