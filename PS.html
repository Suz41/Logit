<html lang="en">
<head>

<style>

:root{
--bg:#0d0d0d;
--surface:#111;
--surface-light:#1a1a1a;
--text-main:#fff;
--text-muted:#888;
--text-sub:#555;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{
height:100%;
background:var(--bg);
color:var(--text-main);
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

body::-webkit-scrollbar{
display:none;
}

/* ========= HEADER ========= */

.header{
height:46px;
padding:0 12px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid #1b1b1b;
position:sticky;
top:0;
background:var(--bg);
z-index:20;
}

.logo{
font-family:'Poppins',sans-serif;
font-size:16px;
font-weight:700;
letter-spacing:-0.5px;
}

.headBtn{
width:30px;
height:30px;
border:none;
border-radius:50%;
background:var(--surface-light);
color:var(--text-main);
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
line-height:1;
}

/* ========= LAYOUT ========= */

.mapWrap{
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

/* ========= HERO ========= */

.hero{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.statBox{
height:78px;
background:var(--surface);
border-radius:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:6px;
text-align:center;
}

.statBox h2{
font-size:20px;
font-weight:700;
font-family:'Poppins',sans-serif;
line-height:1;
margin-bottom:4px;
}

.statBox p{
font-size:9px;
color:var(--text-muted);
text-transform:uppercase;
font-weight:700;
letter-spacing:.5px;
}

.timeSub{
font-size:7px;
font-weight:600;
color:var(--text-muted);
margin-top:4px;
line-height:1.2;
}

/* ========= PEOPLE ========= */

.peopleGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.peopleCard{
background:var(--surface);
border-radius:14px;
padding:12px;
overflow:hidden;
}

.peopleTitle{
font-size:11px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
color:var(--text-sub);
margin-bottom:10px;
}

.peopleList{
display:flex;
flex-direction:column;
gap:8px;
}

.person{
cursor:pointer;
display:flex;
flex-direction:column;
align-items:flex-start;
gap:6px;
overflow:hidden;
}

.personTop{
width:100%;
display:flex;
align-items:center;
gap:8px;
}

.person img{
width:34px;
height:34px;
border-radius:50%;
object-fit:cover;
background:#1a1a1a;
flex-shrink:0;
}

.personInfo{
flex:1;
overflow:hidden;
}

.personName{
font-size:11px;
font-weight:600;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.personCount{
font-size:9px;
color:var(--text-muted);
margin-top:2px;
}

.personMovies{
display:none;
flex-wrap:wrap;
gap:4px;
margin-top:2px;
padding-left:42px;
}

.person.active .personMovies{
display:flex;
}

.movieChip{
height:20px;
padding:0 8px;
border-radius:999px;
background:#1a1a1a;
display:flex;
align-items:center;
justify-content:center;
font-size:8px;
font-weight:600;
color:#bbb;
}

/* ========= META ========= */

.metaGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.metaCard{
background:var(--surface);
border-radius:14px;
padding:12px;
overflow:hidden;
}

.metaHead{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
}

.metaTitle{
font-size:11px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
color:var(--text-sub);
}

.metaTotal{
min-width:22px;
height:22px;
padding:0 7px;
border-radius:999px;
background:var(--surface-light);
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
font-weight:700;
color:#fff;
}

.metaWrap{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.metaItem{
height:24px;
padding:0 10px;
border-radius:999px;
background:var(--surface-light);
display:flex;
align-items:center;
gap:6px;
font-size:10px;
font-weight:600;
color:#ddd;
white-space:nowrap;
}

.metaCount{
font-size:9px;
color:var(--text-muted);
font-weight:700;
}

.empty{
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:var(--text-sub);
text-align:center;
padding:20px;
}

/* ========= IMPORT MODAL ========= */

.importModal{
position:fixed;
inset:0;
background:var(--bg);
z-index:350;
padding:12px;
display:none;
flex-direction:column;
opacity:0;
transition:opacity .2s;
}

.importModal.active{display:flex;opacity:1;}

.importTextarea{
flex:1;
width:100%;
background:var(--surface-light);
border:none;
outline:none;
border-radius:12px;
padding:14px;
color:#fff;
font-family:'Inter',sans-serif;
font-size:13px;
resize:none;
line-height:1.5;
}

.importTextarea::placeholder{color:#555;}

.importFooter{
display:flex;
gap:8px;
margin-top:10px;
align-items:center;
}

.importBtn{
flex:1;
height:44px;
border:none;
border-radius:12px;
background:#fff;
color:#000;
font-size:14px;
font-weight:700;
cursor:pointer;
}

.importBtn:disabled{opacity:.4;cursor:default;}

.importStatus{
font-size:11px;
color:#888;
text-align:center;
margin-top:8px;
min-height:16px;
}

</style>

<script>

/* ========= MOVIES ========= */

const movies=
JSON.parse(
localStorage.getItem("movies")
)||[];

/* ========= DATA ========= */

const countryCount={};
const directorCount={};
const actorCount={};

const genreCount={};
const langCount={};

/* ========= LOOP ========= */

movies.forEach(movie=>{

/* COUNTRY */

if(movie.ct){

let country=movie.ct;

if(country==="United States of America"){

country="United States";

}

countryCount[country]=
(countryCount[country]||0)+1;

}

/* GENRES */

if(movie.g){

movie.g
.split(',')
.forEach(g=>{

const genre=g.trim();

if(!genre)return;

genreCount[genre]=
(genreCount[genre]||0)+1;

});

}

/* LANGUAGES */

if(movie.lg){

movie.lg
.split(',')
.forEach(l=>{

const lang=l.trim();

if(!lang)return;

langCount[lang]=
(langCount[lang]||0)+1;

});

}

/* DIRECTORS */

if(movie.director?.name){

const name=
movie.director.name;

if(!directorCount[name]){

directorCount[name]={
img:movie.director.img||'',
movies:new Set()
};

}

directorCount[name].movies.add(
movie.t
);

}

else if(movie.dr){

const name=movie.dr;

if(!directorCount[name]){

directorCount[name]={
img:'',
movies:new Set()
};

}

directorCount[name].movies.add(
movie.t
);

}

/* ACTORS */

if(movie.cast){

movie.cast
.slice(0,2)
.forEach(actor=>{

const name=actor.name;

if(!name)return;

if(!actorCount[name]){

actorCount[name]={
img:actor.img||'',
movies:new Set()
};

}

actorCount[name].movies.add(
movie.t
);

});

}

else if(movie.c){

movie.c
.split(',')
.slice(0,2)
.forEach(actor=>{

const name=actor.trim();

if(!name)return;

if(!actorCount[name]){

actorCount[name]={
img:'',
movies:new Set()
};

}

actorCount[name].movies.add(
movie.t
);

});

}

});

/* ========= STATS ========= */

const totalMovies=
movies.length;

const totalRuntime=
movies.reduce((a,b)=>{

return a+(Number(b.rt)||0);

},0);

const totalRating=
movies.reduce((a,b)=>{

return a+(Number(b.r)||0);

},0);

const avgRating=
movies.length
?(totalRating/movies.length).toFixed(1)
:"0.0";

/* ========= TIME ========= */

function formatTime(mins){

if(!mins){

return{
main:"0h",
sub:"0 min • 0 days • 0 years"
};

}

const hours=
(mins/60).toFixed(1);

const days=
(mins/1440).toFixed(1);

const years=
(mins/525600).toFixed(2);

return{

main:`${hours}h`,

sub:`
${mins.toLocaleString()} min
•
${days} days
•
${years} years
`

};

}

document.getElementById(
"movieCount"
).innerText=
totalMovies;

const timeData=
formatTime(totalRuntime);

document.getElementById(
"timeCount"
).innerHTML=`

${timeData.main}

<div class="timeSub">

${timeData.sub}

</div>

`;

document.getElementById(
"ratingAvg"
).innerText=
avgRating;

/* ========= TOP PEOPLE ========= */

const topDirectors=
Object.entries(directorCount)
.sort((a,b)=>

b[1].movies.size-
a[1].movies.size

)
.slice(0,5);

const topActors=
Object.entries(actorCount)
.sort((a,b)=>

b[1].movies.size-
a[1].movies.size

)
.slice(0,5);

/* ========= IMAGES ========= */

async function fetchPersonImage(name){

try{

const res=await fetch(

`https://api.themoviedb.org/3/search/person?api_key=8196a17676681ce722aaab7098785c6b&query=${encodeURIComponent(name)}`

);

const data=await res.json();

const path=
data.results?.[0]?.profile_path;

return path
?`https://image.tmdb.org/t/p/w185${path}`
:'https://placehold.co/80x80/1a1a1a/888?text=%20';

}catch{

return'https://placehold.co/80x80/1a1a1a/888?text=%20';

}

}

/* ========= RENDER PEOPLE ========= */

async function renderPeople(){

const dList=
document.getElementById(
"directorList"
);

const aList=
document.getElementById(
"actorList"
);

/* DIRECTORS */

for(const[director,data]of topDirectors){

const img=
data.img
?data.img
:await fetchPersonImage(
director
);

dList.innerHTML+=`

<div class="person">

<div class="personTop">

<img src="${img}">

<div class="personInfo">

<div class="personName">
${director}
</div>

<div class="personCount">
${data.movies.size} films
</div>

</div>

</div>

<div class="personMovies">

${[...data.movies]
.map(movie=>`

<div class="movieChip">
${movie}
</div>

`).join('')}

</div>

</div>

`;

}

/* ACTORS */

for(const[actor,data]of topActors){

const img=
data.img
?data.img
:await fetchPersonImage(
actor
);

aList.innerHTML+=`

<div class="person">

<div class="personTop">

<img src="${img}">

<div class="personInfo">

<div class="personName">
${actor}
</div>

<div class="personCount">
${data.movies.size} films
</div>

</div>

</div>

<div class="personMovies">

${[...data.movies]
.map(movie=>`

<div class="movieChip">
${movie}
</div>

`).join('')}

</div>

</div>

`;

}

}

renderPeople();

/* ========= TOGGLE ========= */

document.addEventListener(
'click',
e=>{

const person=
e.target.closest('.person');

if(!person)return;

person.classList.toggle(
'active'
);

}
);

/* ========= GENRES ========= */

const genreWrap=
document.getElementById(
"genreWrap"
);

document.getElementById(
"genreTotal"
).innerText=
Object.keys(genreCount).length;

Object.entries(genreCount)
.sort((a,b)=>b[1]-a[1])
.forEach(([genre,count])=>{

genreWrap.innerHTML+=`

<div class="metaItem">

${genre}

<span class="metaCount">
${count}
</span>

</div>

`;

});

/* ========= LANGUAGES ========= */

const langWrap=
document.getElementById(
"langWrap"
);

document.getElementById(
"langTotal"
).innerText=
Object.keys(langCount).length;

Object.entries(langCount)
.sort((a,b)=>b[1]-a[1])
.forEach(([lang,count])=>{

langWrap.innerHTML+=`

<div class="metaItem">

${lang.toUpperCase()}

<span class="metaCount">
${count}
</span>

</div>

`;

});

/* ========= REGIONS ========= */

const regionWrap=
document.getElementById(
"regionWrap"
);

document.getElementById(
"regionTotal"
).innerText=
Object.keys(countryCount).length;

Object.entries(countryCount)
.sort((a,b)=>b[1]-a[1])
.forEach(([country,count])=>{

regionWrap.innerHTML+=`

<div class="metaItem">

${country}

<span class="metaCount">
${count}
</span>

</div>

`;

});

/* ========= CLEAR ALL ========= */

function clearAllMovies(){
if(!confirm('Delete all movies? This cannot be undone.'))return;
localStorage.removeItem('movies');
location.reload();
}

/* ========= IMPORT ========= */

var API='8196a17676681ce722aaab7098785c6b';

function openImportModal(){
document.getElementById('importModal').classList.add('active');
document.body.style.overflow='hidden';
document.getElementById('importText').value='';
document.getElementById('importStatus').textContent='';
document.getElementById('importText').focus();
}

function closeImportModal(){
document.getElementById('importModal').classList.remove('active');
document.body.style.overflow='';
document.getElementById('importText').value='';
document.getElementById('importStatus').textContent='';
}

function parseImportLine(line){
line=line.trim();
if(!line)return null;

// Pipe-delimited format: Movie Name | Rating | IMDb/TMDb_ID | Date | RewatchStatus
if(line.includes('|')){
var parts=line.split('|').map(function(p){return p.trim();});
if(parts.length>=3){
var title=parts[0]||'';
var rating=parts[1]?parseFloat(parts[1]):null;
var idField=parts[2]||'';
var date=parts[3]||null;
var rewatch=parts[4]||null;

var tmdbId=null;
var imdbId=null;

var tmdbMatch=idField.match(/tmdb[:\s]*(\d+)/i);
if(tmdbMatch)tmdbId=tmdbMatch[1];
var imdbMatch=idField.match(/\b(tt\d{7,8})\b/i);
if(imdbMatch)imdbId=imdbMatch[1];
if(!tmdbId&&!imdbId&&/^\d+$/.test(idField))tmdbId=idField;

var year=null;
if(date){var dp=date.match(/\d{4}/);if(dp)year=dp[0];}

if(!title&&!tmdbId&&!imdbId)return null;

var isRewatch=false;
if(rewatch){var rw=rewatch.toLowerCase();if(rw==='rewatch'||rw==='re'||rw==='rw'||rw==='yes'||rw==='y')isRewatch=true;}

return{title:title,rating:rating,date:date,year:year,tmdbId:tmdbId,imdbId:imdbId,rewatch:isRewatch};
}
}

var date=null;
var rating=null;
var year=null;
var tmdbId=null;
var imdbId=null;
var title=line;

var imdbMatch=title.match(/\b(tt\d{7,8})\b/i);
if(imdbMatch){imdbId=imdbMatch[1];title=title.replace(imdbMatch[0],'');}

var tmdbMatch=title.match(/\b(?:tmdb[:\s]*|#)(\d{2,})\b/i);
if(tmdbMatch){tmdbId=tmdbMatch[1];title=title.replace(tmdbMatch[0],'');}

var dateMatch=line.match(/\b(\d{4}[-\/]\d{1,2}[-\/]\d{1,2})\b/);
if(!dateMatch)dateMatch=line.match(/\b(\d{1,2}[-\/]\d{1,2}[-\/]\d{4})\b/);
if(!dateMatch)dateMatch=line.match(/\b((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{1,2}[,\s]+\d{4})\b/i);
if(dateMatch){date=dateMatch[1];title=title.replace(dateMatch[0],'');}

var ratingMatch=line.match(/(?:★\s*)?(\d(?:\.\d)?)\s*\/\s*5/);
if(!ratingMatch)ratingMatch=line.match(/(?:rating[:\s]*)?(\d(?:\.\d)?)(?!\s*[\/\d])/i);
if(ratingMatch){var r=parseFloat(ratingMatch[1]);if(r>=0.5&&r<=5){rating=r;title=title.replace(ratingMatch[0],'');}}

var yearMatch=title.match(/\b(19\d{2}|20\d{2})\b/);
if(yearMatch&&!date){year=yearMatch[1];title=title.replace(yearMatch[0],'');}else if(date){var dp=date.match(/\d{4}/);if(dp)year=dp[0];}

title=title.replace(/^[\s,;:\-–—|]+|[\s,;:\-–—|]+$/g,'').replace(/\s{2,}/g,' ').trim();
if(!title&&!tmdbId&&!imdbId)return null;

return{title:title,rating:rating,date:date,year:year,tmdbId:tmdbId,imdbId:imdbId,rewatch:false};
}

function normalizeDate(d){
if(!d){var t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
if(d.match(/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/))return d.replace(/\//g,'-');
if(d.match(/^\d{1,2}[-\/]\d{1,2}[-\/]\d{4}$/)){var p=d.split(/[-\/]/);return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');}
var parsed=new Date(d);
if(!isNaN(parsed.getTime()))return parsed.getFullYear()+'-'+String(parsed.getMonth()+1).padStart(2,'0')+'-'+String(parsed.getDate()).padStart(2,'0');
var t2=new Date();return t2.getFullYear()+'-'+String(t2.getMonth()+1).padStart(2,'0')+'-'+String(t2.getDate()).padStart(2,'0');
}

function watchType(title){
var count=movies.filter(function(m){return m.t===title;}).length;
if(count===0)return'1st Watch';
return'Rewatch \u00b7 '+(count+1)+'x';
}

async function tmdb(url){
try{var r=await fetch(url);if(!r.ok)return null;return await r.json();}catch(e){return null;}
}

document.getElementById('importStartBtn').onclick=async function(){
var text=document.getElementById('importText').value.trim();
if(!text)return;

var lines=text.split('\n').filter(function(l){return l.trim().length>0;});
if(lines.length===0)return;

var btn=document.getElementById('importStartBtn');
btn.disabled=true;
var statusEl=document.getElementById('importStatus');
var imported=0;
var failed=0;
var total=lines.length;

for(var i=0;i<lines.length;i++){
var entry=parseImportLine(lines[i]);
if(!entry){failed++;continue;}

statusEl.textContent='Importing '+(i+1)+'/'+total+': '+(entry.title||entry.tmdbId||entry.imdbId);

try{
var detail=null;

if(entry.tmdbId){
detail=await tmdb('https://api.themoviedb.org/3/movie/'+entry.tmdbId+'?api_key='+API+'&append_to_response=credits,images');
}else if(entry.imdbId){
var findData=await tmdb('https://api.themoviedb.org/3/find/'+entry.imdbId+'?api_key='+API+'&external_source=imdb_id');
if(findData&&findData.movie_results&&findData.movie_results.length>0){
var foundId=findData.movie_results[0].id;
detail=await tmdb('https://api.themoviedb.org/3/movie/'+foundId+'?api_key='+API+'&append_to_response=credits,images');
}
}else{
var searchUrl='https://api.themoviedb.org/3/search/movie?api_key='+API+'&query='+encodeURIComponent(entry.title);
if(entry.year)searchUrl+='&year='+entry.year;
var searchData=await tmdb(searchUrl);
if(!searchData||!searchData.results||searchData.results.length===0){failed++;continue;}

var titleLow=entry.title.toLowerCase();
var candidates=searchData.results.filter(function(m){return m.poster_path;});
if(candidates.length===0)candidates=searchData.results;

var result=candidates[0];
for(var ci=1;ci<candidates.length;ci++){
var c=candidates[ci];
var cTitle=(c.title||'').toLowerCase();
if(cTitle===titleLow&&(result.title||'').toLowerCase()!==titleLow){result=c;continue;}
if(entry.year&&c.release_date&&result.release_date){
var cYear=c.release_date.slice(0,4);
var rYear=result.release_date.slice(0,4);
if(cYear===entry.year&&rYear!==entry.year){result=c;}
}
}
detail=await tmdb('https://api.themoviedb.org/3/movie/'+result.id+'?api_key='+API+'&append_to_response=credits,images');
}
if(!detail){failed++;continue;}

var watch=entry.rewatch?'Rewatch':watchType(detail.title||'');

movies.unshift({
id:crypto.randomUUID(),
t:detail.title||'',
yr:(detail.release_date||'').slice(0,4),
rt:detail.runtime||0,
g:(detail.genres||[]).map(function(x){return x.name;}).join(', '),
dr:((detail.credits&&detail.credits.crew?detail.credits.crew.find(function(x){return x.job==='Director';}):null)||{}).name||'',
c:(detail.credits&&detail.credits.cast?detail.credits.cast.slice(0,10).map(function(x){return x.name;}):[]).join(', '),
lg:detail.original_language||'',
ct:(detail.production_countries&&detail.production_countries[0]?detail.production_countries[0].name:''),
r:entry.rating||3,
w:watch,
d:normalizeDate(entry.date),
sp:detail.poster_path||'',
p:(detail.images&&detail.images.posters?detail.images.posters.map(function(p){return{u:p.file_path,l:p.iso_639_1||'N/A'};}):[])
});

imported++;
}catch(e){failed++;}
}

localStorage.setItem('movies',JSON.stringify(movies));
statusEl.textContent=imported+' imported'+(failed>0?', '+failed+' failed':'');
btn.disabled=false;

setTimeout(function(){closeImportModal();location.reload();},1500);
};

</script>
