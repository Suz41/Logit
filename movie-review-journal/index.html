<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review Journal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        header { background: #16213e; padding: 2rem; text-align: center; }
        header h1 { font-size: 2.5rem; color: #e94560; }
        header p { color: #aaa; margin-top: 0.5rem; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .add-review { background: #16213e; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
        .add-review h2 { color: #e94560; margin-bottom: 1rem; }
        .add-review input, .add-review textarea, .add-review select { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #333; border-radius: 4px; background: #0f3460; color: #eee; }
        .add-review textarea { height: 100px; resize: vertical; }
        .add-review button { background: #e94560; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .add-review button:hover { background: #c73650; }
        .review-card { background: #16213e; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid #e94560; }
        .review-card h3 { color: #e94560; }
        .review-card .rating { color: #f5c518; margin: 0.5rem 0; }
        .review-card .review-text { color: #ccc; line-height: 1.6; }
        .review-card .date { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
        .empty { text-align: center; color: #666; padding: 3rem; }
    </style>
</head>
<body>
    <header>
        <h1>Movie Review Journal</h1>
        <p>Keep track of your movie thoughts and ratings</p>
    </header>
    <div class="container">
        <div class="add-review">
            <h2>Add a Review</h2>
            <input type="text" id="movieTitle" placeholder="Movie Title">
            <select id="rating">
                <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733; 5 Stars</option>
                <option value="4">&#9733;&#9733;&#9733;&#9733; 4 Stars</option>
                <option value="3" selected>&#9733;&#9733;&#9733; 3 Stars</option>
                <option value="2">&#9733;&#9733; 2 Stars</option>
                <option value="1">&#9733; 1 Star</option>
            </select>
            <textarea id="reviewText" placeholder="Write your review..."></textarea>
            <button onclick="addReview()">Save Review</button>
        </div>
        <div id="reviews"></div>
    </div>
    <script>
        let reviews = JSON.parse(localStorage.getItem('movieReviews') || '[]');

        function renderReviews() {
            const container = document.getElementById('reviews');
            if (reviews.length === 0) {
                container.innerHTML = '<div class="empty">No reviews yet. Add your first movie review above!</div>';
                return;
            }
            container.innerHTML = reviews.map((r, i) => `
                <div class="review-card">
                    <h3>${r.title}</h3>
                    <div class="rating">${'&#9733;'.repeat(r.rating)}${'&#9734;'.repeat(5 - r.rating)}</div>
                    <div class="review-text">${r.text}</div>
                    <div class="date">${r.date}</div>
                    <button onclick="deleteReview(${i})" style="margin-top:0.5rem;background:#333;color:#eee;border:none;padding:0.4rem 0.8rem;border-radius:4px;cursor:pointer;font-size:0.85rem;">Delete</button>
                </div>
            `).join('');
        }

        function addReview() {
            const title = document.getElementById('movieTitle').value.trim();
            const rating = parseInt(document.getElementById('rating').value);
            const text = document.getElementById('reviewText').value.trim();
            if (!title || !text) return alert('Please fill in all fields');
            reviews.unshift({ title, rating, text, date: new Date().toLocaleDateString() });
            localStorage.setItem('movieReviews', JSON.stringify(reviews));
            document.getElementById('movieTitle').value = '';
            document.getElementById('reviewText').value = '';
            renderReviews();
        }

        function deleteReview(index) {
            reviews.splice(index, 1);
            localStorage.setItem('movieReviews', JSON.stringify(reviews));
            renderReviews();
        }

        renderReviews();
    </script>
</body>
</html>
